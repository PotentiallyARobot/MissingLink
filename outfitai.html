<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0B0D">
<title>WhatShouldIWear — AI Stylist</title>
<style>
  :root{
    --bg:#0B0B0D; --bg2:#141416; --bg3:#1E1E22; --bg4:#26262B;
    --accent:#EBB7E6; --accent2:#C98BD9;
    --text:#F4F2F5; --muted:#8C8A92; --line:#262630;
    --good:#7BD88F; --bad:#E98D8D;
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    background:#000; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; justify-content:center;
  }
  /* phone-frame column — fixed to the viewport; only .scroll scrolls */
  #app{
    width:100%; max-width:480px; background:var(--bg);
    height:100%; height:100dvh;
    position:relative; display:flex; flex-direction:column;
    box-shadow:0 0 80px rgba(0,0,0,.6); overflow:hidden;
  }
  .scroll{flex:1; min-height:0; overflow-y:auto; overscroll-behavior:contain;
    padding:0 0 96px; -webkit-overflow-scrolling:touch}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  /* baseline icon size — every inline SVG icon stays small unless a more
     specific rule below overrides it. Without this, an SVG with only a
     viewBox expands to the ~300x150 replaced-element default. */
  svg{width:18px;height:18px;flex:none;vertical-align:middle}
  ::-webkit-scrollbar{width:0;height:0}

  /* ── top bar ── */
  .topbar{
    display:flex;align-items:center;gap:10px;padding:18px 18px 12px;
    position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);z-index:20;
  }
  .topbar h1{font-size:19px;font-weight:700;margin:0;flex:1;letter-spacing:-.2px}
  .topbar .back{font-size:22px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    border-radius:50%;background:var(--bg3)}
  .logo{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .logo .ai{color:var(--accent)}
  .pill{background:var(--bg3);border:1px solid var(--line);border-radius:999px;
    padding:6px 12px;font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:5px}
  .pill b{color:var(--accent)}
  .subbtn{background:var(--accent);color:#1a121a;font-weight:800;font-size:12px;
    border-radius:999px;padding:8px 15px;white-space:nowrap;flex:none;letter-spacing:.1px}
  .subbtn:active{transform:scale(.96)}

  /* ── generic ── */
  .pad{padding:0 18px}
  .sub{color:var(--muted);font-size:13px;line-height:1.45}
  .h2{font-size:15px;font-weight:700;margin:22px 0 12px}
  .h2.row{display:flex;align-items:center;justify-content:space-between}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r)}

  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--accent);color:#1a121a;font-weight:700;font-size:15px;
    border-radius:14px;padding:14px;width:100%;transition:transform .08s,opacity .15s;
  }
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:var(--bg3);color:var(--text);border:1px solid var(--line)}
  .btn.sm{padding:10px 14px;font-size:13px;border-radius:11px;width:auto}
  .btn[disabled]{opacity:.45;pointer-events:none}

  .chip{
    background:var(--bg3);border:1px solid var(--line);border-radius:999px;
    padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;
  }
  .chip.on{background:var(--accent);color:#1a121a;border-color:var(--accent)}
  .chip.tag{color:var(--muted);font-weight:500}
  .chips{display:flex;flex-wrap:wrap;gap:8px}

  textarea,input[type=text]{
    width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:14px;
    color:var(--text);padding:13px 14px;font-size:14px;resize:none;outline:none;
  }
  textarea:focus,input[type=text]:focus{border-color:var(--accent2)}
  .field{margin:12px 0}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  input[type=date],input[type=time]{
    background:transparent;border:none;color:var(--text);font-size:14px;text-align:right;outline:none;
  }
  ::placeholder{color:#5c5b63}

  /* ── tabs ── */
  .tabs{display:flex;gap:20px;padding:4px 18px 0;border-bottom:1px solid var(--line);
    overflow-x:auto;scrollbar-width:none}
  .tab{padding:11px 0;font-size:14px;font-weight:600;color:var(--muted);position:relative;
    white-space:nowrap;flex:none}
  .tab.on{color:var(--text)}
  .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2.5px;
    background:var(--accent);border-radius:2px}

  /* ── grid of item cards ── */
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .grid.two{grid-template-columns:1fr 1fr}
  .icard{
    background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    position:relative;text-align:left;
  }
  .icard .ph{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--bg4)}
  .icard .meta{padding:8px 9px}
  .icard .nm{font-size:11.5px;font-weight:600;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .icard .ct{font-size:9.5px;color:var(--muted);margin-top:2px}
  .icard .badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);
    font-size:9px;padding:3px 7px;border-radius:999px;color:var(--accent);font-weight:700}

  .addtile{
    border:1.5px dashed var(--line);background:var(--bg2);border-radius:14px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
    aspect-ratio:1/1;color:var(--muted);font-size:11px;font-weight:600;
  }
  .addtile svg{width:22px;height:22px}

  /* ── reference photo slot ── */
  .refgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .refslot{aspect-ratio:3/4;border-radius:13px;overflow:hidden;position:relative;background:var(--bg2);
    border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:6px;color:var(--muted);font-size:10px;font-weight:600;text-align:center;padding:6px}
  .refslot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .refslot .x{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;
    background:rgba(0,0,0,.78);font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2}

  /* ── detail rows ── */
  .drow{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
  .drow:last-child{border:none}
  .drow .k{color:var(--muted)}
  .drow .k svg{width:15px;height:15px;margin-right:5px;color:var(--accent)}
  .drow .v{font-weight:600;text-align:right}

  /* ── bottom nav ── */
  .nav{
    position:absolute;left:0;right:0;bottom:0;display:flex;
    background:rgba(13,13,15,.94);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);padding:8px 4px max(8px,env(safe-area-inset-bottom));
  }
  .navb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);
    font-size:10px;font-weight:600;padding:4px 0}
  .navb svg{width:22px;height:22px}
  .navb.on{color:var(--accent)}
  .navb.gen{margin-top:-2px}
  .navb.gen .gico{width:38px;height:38px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;margin-bottom:1px}
  .navb.gen .gico svg{width:20px;height:20px}

  /* ── loading / overlays ── */
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:50px 30px;gap:14px;min-height:60vh}
  .spinner{width:38px;height:38px;border:3px solid var(--bg4);border-top-color:var(--accent);
    border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .skel{background:linear-gradient(90deg,var(--bg3),var(--bg4),var(--bg3));
    background-size:200% 100%;animation:sh 1.3s infinite}
  @keyframes sh{to{background-position:-200% 0}}

  .toast{
    position:fixed;left:50%;transform:translateX(-50%);bottom:96px;z-index:200;
    background:var(--bg4);border:1px solid var(--line);color:var(--text);
    padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;
    box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:150;
    display:flex;align-items:flex-end;justify-content:center}
  .sheet{width:100%;max-width:480px;background:var(--bg2);border-top-left-radius:22px;
    border-top-right-radius:22px;border-top:1px solid var(--line);padding:8px 18px 30px;
    max-height:90vh;overflow-y:auto;animation:up .22s ease}
  @keyframes up{from{transform:translateY(100%)}}
  .grab{width:38px;height:4px;background:var(--bg4);border-radius:2px;margin:8px auto 16px}

  /* result page */
  .lookimg{width:100%;border-radius:var(--r);display:block;background:var(--bg2);aspect-ratio:2/3;object-fit:cover}
  .usedrow{display:flex;align-items:center;gap:10px;padding:9px;background:var(--bg2);
    border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
  .usedrow img{width:42px;height:42px;border-radius:9px;object-fit:cover;background:var(--bg4)}
  .usedrow .un{font-size:12.5px;font-weight:600}
  .usedrow .uc{font-size:10px;color:var(--muted)}
  .bubble{padding:11px 13px;border-radius:14px;font-size:13px;line-height:1.5;max-width:85%}
  .bubble.ai{background:var(--bg3);border:1px solid var(--line)}
  .bubble.me{background:var(--accent);color:#1a121a;font-weight:500;align-self:flex-end}
  .chatrow{display:flex;gap:8px;align-items:flex-end}

  /* ── chat-style result page ── */
  .composer{position:absolute;left:0;right:0;bottom:0;
    background:rgba(13,13,15,.97);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);padding:9px 12px max(9px,env(safe-area-inset-bottom))}
  .nav:empty,.composer:empty{display:none}
  .composer textarea{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:13px;
    color:var(--text);padding:11px 13px;font-size:13.5px;resize:none;max-height:120px}
  .composer .btn{width:46px;height:46px;border-radius:13px;padding:0;flex:none}
  #thread{display:flex;flex-direction:column;gap:10px;padding-top:8px}
  .lookcard{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:12px;margin:2px 0}
  .lookname{font-size:16px;font-weight:800;margin:11px 2px 2px}
  .lookpara{font-size:13px;line-height:1.55;color:var(--text);margin:5px 2px 2px}
  .looksec{font-size:11px;font-weight:700;color:var(--accent);margin:15px 2px 8px;
    text-transform:uppercase;letter-spacing:.5px}
  .shoplink{display:inline-block;margin-top:5px;font-size:11px;font-weight:800;color:var(--accent)}
  .sugg{background:var(--bg3);border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-bottom:7px}
  .lookacts{margin-top:15px}
  .usedrow-ph{width:42px;height:42px;border-radius:9px;background:var(--bg4);
    display:flex;align-items:center;justify-content:center;flex:none}
  .loadingb .dots{display:inline-flex;gap:5px;padding:1px 0}
  .loadingb .dots i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
  .loadingb .dots i:nth-child(2){animation-delay:.2s}
  .loadingb .dots i:nth-child(3){animation-delay:.4s}

  /* ── staged generation progress ── */
  .progress{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:15px 15px 13px}
  .progress .bar{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden;margin-bottom:13px}
  .progress .bar i{display:block;height:100%;background:var(--accent);border-radius:3px;
    width:0;transition:width .5s ease}
  .pstep{display:flex;align-items:center;gap:9px;font-size:13px;padding:3px 0;color:var(--muted)}
  .pstep .ic{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:none;
    display:flex;align-items:center;justify-content:center;font-size:10px}
  .pstep.done{color:var(--text)}
  .pstep.done .ic{background:var(--accent);border-color:var(--accent);color:#1a121a}
  .pstep.active{color:var(--text);font-weight:600}
  .pstep.active .ic{border-color:var(--accent);
    border-top-color:transparent;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  /* ── segmented toggle ── */
  .seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px}
  .segb{flex:1;padding:10px 0;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted)}
  .segb.on{background:var(--accent);color:#1a121a}

  .empty{text-align:center;color:var(--muted);font-size:13px;padding:38px 24px;line-height:1.6}
  .star{color:var(--accent);font-size:13px}

  /* ── notification bell ── */
  .bell{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
    color:var(--text);position:relative;flex:none}
  .bell svg{width:21px;height:21px}
  .bell .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;
    background:var(--accent);border:1.5px solid var(--bg)}

  /* ── add-row card ── */
  .addrow{display:flex;align-items:center;gap:13px;background:var(--bg2);
    border:1px solid var(--line);border-radius:16px;padding:13px;width:100%;text-align:left}
  .addrow:active{transform:scale(.99)}
  .addrow .box{width:54px;height:54px;border-radius:12px;border:1.6px dashed var(--accent2);
    display:flex;align-items:center;justify-content:center;color:var(--accent);flex:none}
  .addrow .box svg{width:22px;height:22px}
  .addrow .t1{font-size:14.5px;font-weight:700;color:var(--accent)}
  .addrow .t2{font-size:11.5px;color:var(--muted);margin-top:2px}
  .addrow .chev{color:var(--muted);font-size:21px;margin-left:auto;padding-right:4px}

  /* ── empty wardrobe card ── */
  .emptycard{background:var(--bg2);border:1px solid var(--line);border-radius:20px;
    padding:24px 22px;text-align:center;margin-top:14px}
  .emptycard img.hero{width:300px;max-width:90%;height:auto;border-radius:12px;
    margin:2px auto 6px;display:block}
  .emptycard .et{font-size:21px;font-weight:800;letter-spacing:-.3px}
  .emptycard .es{font-size:13px;color:var(--muted);line-height:1.55;margin:8px auto 18px;max-width:290px}
  .emptycard .tip{font-size:11.5px;color:var(--muted);margin-top:14px;
    display:flex;align-items:center;justify-content:center;gap:6px;line-height:1.5}
  .emptycard .tip svg{width:14px;height:14px;color:var(--accent);flex:none}

  /* ── suggestion row ── */
  .suggrow{display:flex;gap:11px;overflow-x:auto;padding:4px 18px 4px;margin:12px -18px 0;
    scroll-snap-type:x proximity}
  .suggcard{flex:none;width:108px;scroll-snap-align:start;background:none;padding:0}
  .suggcard img{width:108px;height:108px;border-radius:14px;object-fit:cover;
    background:var(--bg3);border:1px solid var(--line);display:block}
  .suggcard:active img{border-color:var(--accent2)}
  .suggcard .sl{font-size:11.5px;color:var(--muted);text-align:center;margin-top:7px;font-weight:600}

  /* ── add-item choice + image search ── */
  .choicebtn{display:flex;align-items:center;gap:13px;width:100%;text-align:left;
    background:var(--bg3);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
  .choicebtn:active{transform:scale(.99)}
  .choicebtn .ci{width:44px;height:44px;border-radius:11px;background:var(--bg);
    display:flex;align-items:center;justify-content:center;color:var(--accent);flex:none}
  .choicebtn .ci svg{width:21px;height:21px}
  .choicebtn .cm b{font-size:14px;font-weight:700;display:block}
  .choicebtn .cm span{font-size:11.5px;color:var(--muted)}
  .searchbar{display:flex;gap:8px}
  .searchgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;
    max-height:46vh;overflow-y:auto;padding-bottom:4px}
  .sresult{border-radius:11px;overflow:hidden;background:var(--bg3);display:block;
    border:1px solid var(--line);position:relative;padding:0;line-height:0}
  .sresult:active{transform:scale(.97)}
  .sresult img{display:block;width:100%;aspect-ratio:1/1;object-fit:cover}

  /* ── trending banner (compact) ── */
  .trend{margin:16px 0 4px}
  .trendhead{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .trendhead .th{font-size:13.5px;font-weight:800;letter-spacing:-.2px}
  .trendhead svg{width:15px;height:15px;color:var(--accent)}
  .trendhead .ts{font-size:10px;color:var(--muted);margin-left:auto;font-weight:600}
  .trendrow{display:flex;gap:9px;overflow-x:auto;margin:0 -18px;padding:1px 18px 3px;
    scroll-snap-type:x proximity}
  .tcard{flex:none;width:112px;scroll-snap-align:start;background:var(--bg2);
    border:1px solid var(--line);border-radius:12px;overflow:hidden;display:block;color:inherit}
  .tcard:active{transform:scale(.98)}
  .tcard .tim{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--bg3);display:block}
  .tcard .tb{padding:8px 9px 10px}
  .tcard .tn{font-size:11px;font-weight:700;line-height:1.3;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .trendskel{display:flex;gap:9px;margin:0 -18px;padding:1px 18px 3px}
  .trendskel .tsk{flex:none;width:112px;height:152px;border-radius:12px}
</style>
</head>
<body>
<div id="app">
  <div class="scroll" id="screen"></div>
  <div class="nav" id="nav"></div>
  <div class="composer" id="composer"></div>
</div>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════
   WhatShouldIWear — front-end
   Talks to the OutfitAI worker routes (/api/outfitai/*) and reuses the
   Studio Google sign-in (/auth/*). Served at missinglink.build/outfitai.
   ════════════════════════════════════════════════════════════════ */

function pickImage(){
  return new Promise(res=>{
    const inp=document.createElement("input");
    inp.type="file";inp.accept="image/*";
    inp.onchange=()=>res(inp.files&&inp.files[0]?inp.files[0]:null);
    inp.click();
  });
}
// Lets the user select several photos at once. Returns an array of Files.
function pickImages(){
  return new Promise(res=>{
    const inp=document.createElement("input");
    inp.type="file";inp.accept="image/*";inp.multiple=true;
    inp.onchange=()=>res(inp.files?Array.from(inp.files):[]);
    inp.click();
  });
}
function compress(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const max=1280;let{width:w,height:h}=img;
      if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>b?res(b):rej(new Error("compress failed")),"image/jpeg",0.86);
    };
    img.onerror=()=>rej(new Error("bad image"));
    img.src=URL.createObjectURL(file);
  });
}
async function uploadImage(file){
  const blob=await compress(file);
  const fd=new FormData();
  fd.append("image",new File([blob],"photo.jpg",{type:"image/jpeg"}));
  const d=await api("/api/studio/upload",{method:"POST",body:fd});
  if(!d.ok) throw new Error(d.error||"upload failed");
  return d.id; // studio_uploads id
}

async function loadTrending(retry){
  if(S.trendingLoaded && !retry) return;
  S.trendingLoaded=true;
  try{
    const d=await api("/api/outfitai/trending?gender="+encodeURIComponent(S.gender));
    if(d&&d.ok&&Array.isArray(d.items)) S.trending=d.items;
    else if(!retry) S.trending=[];
    // A cold/stale cache means the full AI-picked list is still building
    // server-side — refetch once shortly after to swap in fresh trends.
    if(d&&d.stale&&!retry){
      clearTimeout(S._trendT);
      S._trendT=setTimeout(()=>loadTrending(true),22000);

  if(S.tab==="wardrobe"&&!S.viewItemId&&!S.lookId) render();

    if(!d.ok){
      const msg=d.error==="search_unavailable"
          ?"Online search isn't enabled on this app yet — please upload a photo instead."

          :"Couldn't search just now. You can upload a photo instead.";
      box.innerHTML=`<div class="empty">${msg}</div>`;
      return;

async function saveItemEdits(id){
  const payload={
    name:($("f_name").value||"").trim()||"Untitled item",
    type:($("f_type").value||"").trim(),
    brand:($("f_brand").value||"").trim(),
    description:($("f_desc").value||"").trim(),
  };
  const btn=$("save");if(btn){btn.disabled=true;btn.textContent="Saving…";}
  try{
    const d=await api("/api/outfitai/item/"+id+"/update",{
      method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify(payload)
    });

/* Auto-gather city + weather + temperature via geolocation. Resolves fast
   (with {}) if permission is denied or it takes too long, so generation
   never blocks on it. Time of day is left to the server (evening assumed). */
function gatherContext(){
  return new Promise(resolve=>{
    if(!navigator.geolocation) return resolve({});
    let done=false;
    const finish=v=>{if(!done){done=true;resolve(v);}};
    setTimeout(()=>finish({}),8500);
    navigator.geolocation.getCurrentPosition(async pos=>{
      const{latitude:lat,longitude:lon}=pos.coords;const out={};
      try{
        const wx=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`).then(r=>r.json());
        if(wx&&wx.current){
          if(wx.current.temperature_2m!=null)out.temperature=Math.round(wx.current.temperature_2m)+"°F";
          if(wx.current.weather_code!=null)out.weather=wxText(wx.current.weather_code);
        }
      }catch(e){}
      try{
        const geo=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`).then(r=>r.json());
        const city=geo.city||geo.locality||geo.principalSubdivision||"";
        const region=geo.principalSubdivisionCode?geo.principalSubdivisionCode.split("-").pop():(geo.countryName||"");
        out.location=[city,region].filter(Boolean).join(", ");
      }catch(e){}
      finish(out);
    },()=>finish({}),{timeout:8000,maximumAge:600000});
  });
}
function wxText(c){
  if(c===0)return"Clear";
  if(c<=2)return"Partly cloudy";
  if(c===3)return"Overcast";
  if(c<=48)return"Foggy";
  if(c<=67)return"Rainy";
  if(c<=77)return"Snow";
  if(c<=82)return"Showers";
  if(c<=99)return"Thunderstorm";
  return"Clear";
}

/* The generate endpoint streams Server-Sent Events: a series of "phase"
   events as each real pipeline step happens, then a final "done" or
   "error". S.genPhases holds the phases the server has actually reported,
   so the user sees what it's genuinely doing — not a timed guess. */
function pushPhase(label){
  // Mark any in-flight phase complete, then add the new one as active.
  S.genPhases=(S.genPhases||[]).map(p=>({...p,done:true}));
  S.genPhases.push({label,done:false});
  if(S.lookId==="pending") drawThread();
}

async function doGenerate(){
  if(!S.items.length){toast("Add wardrobe items first");return;}
  if(tokens()<TOK_PER_GEN){toast("Not enough tokens — tap Subscribe for more");return;}
  const notes=GEN.notes.trim();
  S.chat=[{role:"me",text:notes||"Style me a look for tonight."}];
  S.lookId="pending";S.lookData=null;S.busy=true;S.genPhases=[];
  render();

  pushPhase("Checking the weather where you are");
  let ctx={};
  try{ctx=await gatherContext();}catch(e){ctx={};}

  const fail=(msg)=>{
    S.busy=false;S.lookId=null;S.lookData=null;S.genPhases=[];render();toast(msg);
  };

  try{
    const res=await fetch(API+"/api/outfitai/generate",{
      method:"POST",credentials:"include",
      headers:{"content-type":"application/json"},
      body:JSON.stringify({
        event:notes,mode:GEN.mode,
        location:ctx.location||"",weather:ctx.weather||"",temperature:ctx.temperature||""
      })
    });
    // A non-stream JSON body means an up-front error (e.g. not enough tokens).
    const ctype=res.headers.get("content-type")||"";
    if(!ctype.includes("text/event-stream")){
      let d={}; try{d=await res.json();}catch(e){}
      return fail(d.error==="empty_wardrobe"?"Add wardrobe items first":
        d.error==="insufficient_tokens"?"Not enough tokens — tap Subscribe for more":
        ("Couldn't generate: "+(d.detail||d.error||res.status)));
    }

    // Read the SSE stream line by line.
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf="",finished=false;
    while(true){
      const{value,done}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      let nl;
      while((nl=buf.indexOf("\n\n"))>=0){
        const chunk=buf.slice(0,nl);buf=buf.slice(nl+2);
        const line=chunk.split("\n").find(l=>l.startsWith("data:"));
        if(!line)continue;
        let ev;try{ev=JSON.parse(line.slice(5).trim());}catch(e){continue;}
        if(ev.type==="phase"){
          pushPhase(ev.label||"Working…");
        }else if(ev.type==="error"){
          finished=true;
          return fail(ev.error==="insufficient_tokens"
            ?"Not enough tokens — tap Subscribe for more"
            :("Couldn't generate: "+(ev.detail||ev.error)));
        }else if(ev.type==="done"){
          finished=true;
          if(typeof ev.tokens_remaining==="number"&&S.user)S.user.tokens=ev.tokens_remaining;
          S.genPhases=(S.genPhases||[]).map(p=>({...p,done:true}));
          S.looks.unshift({id:ev.look.id,event:notes||"Styled look",result_url:ev.look.result_url,
            explanation:ev.look.explanation,item_ids:ev.look.item_ids,created_at:Date.now()/1000,
            outfit_name:ev.look.outfit_name,why_you:ev.look.why_you,why_together:ev.look.why_together,
            online_items:ev.look.online_items,mode:ev.look.mode});
          S.busy=false;S.lookId=ev.look.id;S.lookData=ev.look;S.genPhases=[];
          render();
        }
      }
    }
    if(!finished) fail("Generation was interrupted — please try again.");
  }catch(e){
    fail("Generation failed: "+e.message);
  }
}

function genProgressHTML(){
  const phases=S.genPhases||[];
  if(!phases.length){
    return `<div class="progress"><div class="pstep active"><span class="ic"></span>Getting started…</div></div>`;
  }
  const doneCount=phases.filter(p=>p.done).length;
  const pct=Math.min(96,Math.round((doneCount/(phases.length+1))*100)+8);
  const rows=phases.map(p=>{
    const cls=p.done?"done":"active";
    const ic=p.done?"✓":"";
    return `<div class="pstep ${cls}"><span class="ic">${ic}</span>${esc(p.label)}</div>`;
  }).join("");
  return `<div class="progress">
    <div class="bar"><i style="width:${pct}%"></i></div>
    ${rows}
  </div>`;
}
function drawThread(){
  const t=$("thread");if(!t)return;
  let html=S.chat.map(m=>`<div class="bubble ${m.role==="me"?"me":"ai"}">${esc(m.text)}</div>`).join("");

      ? genProgressHTML()

  }
  t.innerHTML=html;
  t.querySelectorAll("[data-id]").forEach(r=>r.onclick=()=>{
    if(S.items.find(i=>i.id===r.dataset.id)){S.viewItemId=r.dataset.id;render();}

async function sendChat(msg){
  if(S.busy)return;
  if(!S.lookId||S.lookId==="pending")return;
  if(tokens()<TOK_PER_GEN){toast("Not enough tokens — tap Subscribe for more");return;}
  S.chat.push({role:"me",text:msg});
  S.busy=true;render();
  try{
    const d=await api("/api/outfitai/chat",{
      method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({look_id:S.lookId,message:msg})
    });
    S.busy=false;
    if(!d.ok){
      S.chat.push({role:"ai",text:"Sorry — that didn't work. Mind rephrasing the change?"});
      render();
      toast(d.error==="insufficient_tokens"?"Not enough tokens — tap Subscribe for more":"Couldn't update look");
      return;
    }
    if(typeof d.tokens_remaining==="number"&&S.user)S.user.tokens=d.tokens_remaining;
    S.lookData=d.look;
    S.chat.push({role:"ai",text:d.reply||d.look.explanation});
    const li=S.looks.findIndex(x=>x.id===S.lookId);
    if(li>=0){const s=S.looks[li];
      s.result_url=d.look.result_url;s.explanation=d.look.explanation;s.item_ids=d.look.item_ids;
      s.outfit_name=d.look.outfit_name;s.why_you=d.look.why_you;s.why_together=d.look.why_together;
      s.online_items=d.look.online_items;}
    render();
  }catch(e){
    S.busy=false;
    S.chat.push({role:"ai",text:"Something went wrong — try again?"});
    render();
  }
}

      </div>

      <div class="card" style="padding:16px;margin-top:12px;display:flex;justify-content:space-around;text-align:center">
        <div><div style="font-size:20px;font-weight:800;color:var(--accent)">${tokens()}</div><div class="uc">Tokens</div></div>
        <div><div style="font-size:20px;font-weight:800">${wardrobeCount}</div><div class="uc">Wardrobe</div></div>
        <div><div style="font-size:20px;font-weight:800">${S.references.length}</div><div class="uc">Photos</div></div>
        <div><div style="font-size:20px;font-weight:800">${S.looks.length}</div><div class="uc">Looks</div></div>
      </div>

      <div class="h2">Gender</div>
      <div class="card" style="padding:14px">
        <div class="seg" id="genderSeg">
          <button class="segb ${S.gender==="female"?"on":""}" data-g="female">Female</button>
          <button class="segb ${S.gender==="male"?"on":""}" data-g="male">Male</button>
        </div>
        <div class="sub" style="font-size:11px;margin-top:8px">
          Tailors every generated look to your style — and themes the app to match.</div>
      </div>

      <div class="h2">Tokens & subscription</div>
      <div class="card" style="padding:14px">
        <div class="sub">Each generated look (and each refinement) costs
          <b style="color:var(--accent)">${TOK_PER_GEN} tokens</b>. Wardrobe analysis is free.
          Subscribe for a regular top-up of styling tokens.</div>
        <button class="btn sm" id="buy" style="width:100%;margin-top:12px">Subscribe</button>
      </div>

      <div class="h2">How it works</div>
      <div class="card" style="padding:14px">
        <div class="sub" style="line-height:1.7">
          1 · Add your clothes in <b style="color:var(--text)">Wardrobe</b>.<br>
          2 · Optional — add photos of yourself in <b style="color:var(--text)">Photos</b> to see
          looks on you instead of a mannequin.<br>
          3 · Describe the occasion on <b style="color:var(--text)">Generate</b>.<br>
          4 · Get your styled look, then chat to tweak it.
        </div>
      </div>

      <div style="height:18px"></div>
      <button class="btn ghost" id="out">Sign out</button>
      <div class="sub" style="text-align:center;font-size:11px;margin-top:14px">
        WhatShouldIWear · powered by <a href="https://missinglink.build" target="_blank">MissingLink</a></div>
      <div style="height:14px"></div>
    </div>`;
  $("out").onclick=logout;
  $("buy").onclick=openSubscribe;
  sc.querySelectorAll("#genderSeg .segb").forEach(b=>b.onclick=()=>{
    if(b.dataset.g!==S.gender) setGender(b.dataset.g);
  });
}

/* ════════════════ boot ════════════════ */
try{ const g=localStorage.getItem("oa_gender"); if(g){ S.gender=g; applyTheme(g); } }catch(e){}
loadState();
</script>
</body>
</html>
