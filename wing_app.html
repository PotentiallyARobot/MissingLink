<style>
  html, body { margin: 0; padding: 0; height: 100%; }

    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1a0a2e 0%, #0a0815 60%, #050309 100%);

    overscroll-behavior: none;
  }
  .leaflet-container { background: #0a0815 !important; font-family: inherit; }
  .leaflet-control-attribution {
    background: rgba(0,0,0,0.4) !important;
    color: #64748b !important;
    font-size: 9px !important;
    padding: 2px 6px !important;
  }

  .wing-pin-wrap { background: transparent !important; border: 0 !important; }

  .live-ping { animation: ping 2s cubic-bezier(0,0,0.2,1) infinite; }
  @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }

  .pred-pulse { animation: predPulse 3s ease-in-out infinite; }
  @keyframes predPulse {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  @keyframes pulseSoft {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }

  .tabular { font-variant-numeric: tabular-nums; }

  .filter-active-tinder { background: linear-gradient(135deg, rgba(244,63,94,0.25), rgba(251,113,133,0.15)); border-color: rgba(244,63,94,0.6); color: #fb7185; }

  .img-wrap { position: relative; }
  .img-wrap img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .img-wrap.errored img { display: none; }
  .img-wrap .img-fallback { display: none; position: absolute; inset: 0; }
  .img-wrap.errored .img-fallback { display: block; }

  /* PREDICTION MODE */
  body.prediction-mode .stat-card,
  body.prediction-mode .pred-card {
    border-style: dashed !important;
    border-color: rgba(167,139,250,0.35) !important;
    background: rgba(167,139,250,0.04) !important;
  }
  body.prediction-mode #map-section::after {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(45deg,
        rgba(167,139,250,0.08) 0,
        rgba(167,139,250,0.08) 8px,
        transparent 8px,
        transparent 18px),
      rgba(10,8,21,0.5);
    pointer-events: none;
    z-index: 400;
  }
  body.prediction-mode #map-section::before {
    content: 'PREDICTION · TONIGHT';
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    background: rgba(15,10,30,0.92);
    border: 1px dashed rgba(167,139,250,0.5);
    color: #c4b5fd;

  body:not(.prediction-mode) .pred-only { display: none !important; }

/* ==========================================================
   TIME-OF-DAY MODEL
   ========================================================== */
function getActivityLevel(date, venue = null) {
  const h = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;

  // Per-venue-type peak offset — shifts the curve forward/backward in time
  // wine/french bars peak earlier (dinner crowd), whiskey/rooftop later (late night)
  let offset = 0;
  if (venue) {
    if (venue.type === 'french' || venue.type === 'wine') offset = -1.0;       // peak ~10pm
    else if (venue.type === 'cafe') offset = -1.5;                              // peak ~9:30pm
    else if (venue.type === 'cocktail') offset = 0;                             // peak ~11pm
    else if (venue.type === 'whiskey') offset = 0.4;                            // peak ~11:30pm
    else if (venue.type === 'rooftop') offset = 0.6;                            // peak ~11:30pm-12am
  }
  const adj = h - offset;

  if (adj < 1)  return 0.96;
  if (adj < 2)  return 0.78;
  if (adj < 3)  return 0.50;
  if (adj < 4)  return 0.22;
  if (adj < 11) return 0.04;
  if (adj < 16) return 0.06;
  if (adj < 17) return 0.10;
  if (adj < 18) return 0.16;
  if (adj < 19) return 0.28;
  if (adj < 20) return 0.45;
  if (adj < 21) return 0.62;
  if (adj < 22) return 0.80;
  if (adj < 23) return 0.93;
  return 1.00;
}

function getPeakDate(now) {
  const peak = new Date(now);
  peak.setMinutes(0); peak.setSeconds(0); peak.setMilliseconds(0);
  if (now.getHours() < 4) peak.setDate(peak.getDate() - 1);
  peak.setHours(23);
  return peak;
}

function getTimeContext(date) {
  const h = date.getHours();
  if (h >= 4 && h < 11) return { mode:'morning',    phase:'Quiet morning',  headline:'Most spots are closed',     detail:'Doors start opening around 5 PM',           isLive:false };
  if (h >= 11 && h < 16) return { mode:'afternoon', phase:'Daytime',        headline:"Tonight's preview",          detail:'Crowds build after 8 PM · peak around 11 PM', isLive:false };
  if (h >= 16 && h < 18) return { mode:'preopen',   phase:'Doors opening',  headline:'First arrivals trickling in', detail:'Real ramp-up around 8 PM',                  isLive:true };
  if (h >= 18 && h < 21) return { mode:'building',  phase:'Building up',    headline:'Crowd is forming',           detail:'Picks up fast in the next hour or two',     isLive:true };
  if (h >= 21 && h < 23) return { mode:'heating',   phase:'Heating up',     headline:"It's on",                    detail:'Peak window is 11 PM–1 AM',                 isLive:true };
  if (h === 23 || (h >= 0 && h < 1)) return { mode:'peak', phase:'Peak hours', headline:'Right now is the move', detail:'Maximum activity across DC',                isLive:true };
  if (h >= 1 && h < 3) return { mode:'late-peak',   phase:'Late peak',      headline:'Still going',                detail:'Last call coming up — head out now',        isLive:true };
  return                       { mode:'closing',     phase:'Last call',      headline:'Winding down',               detail:'Most spots closing in the next hour',       isLive:true };
}

function getDisplayTime(date) {
  return getTimeContext(date).isLive ? date : getPeakDate(date);
}

function getBestArrival(date, venue) {
  const h = date.getHours() + date.getMinutes() / 60;
  const offset = (venue.type === 'french' || venue.type === 'wine') ? -0.75 : (venue.type === 'whiskey' ? 0.25 : 0);
  let target = 22.25 + offset;
  if (h >= 23 || h < 4) target = 23.5 + offset;
  const diff = target - (h < 4 ? h + 24 : h);
  if (Math.abs(diff) < 0.25) return 'Right now';
  if (diff < 0 && diff > -2) return 'Now (peak)';
  if (diff < -2) return "You're past peak";
  const tH = Math.floor(target) % 24;
  const tM = Math.round((target % 1) * 60);
  const ampm = tH >= 12 ? 'PM' : 'AM';
  const h12 = ((tH + 11) % 12) + 1;
  return `${h12}:${String(tM).padStart(2, '0')} ${ampm}`;
}

function timeUntilPeak(date) {
  const h = date.getHours() + date.getMinutes() / 60;
  if (h < 4) return null;
  const diff = 23 - h;
  if (diff <= 0) return null;
  const hrs = Math.floor(diff);
  const mins = Math.round((diff - hrs) * 60);
  return hrs === 0 ? `${mins}m` : `${hrs}h ${mins}m`;
}

function seededRand(id, bucketMs = 60000) {
  const bucket = Math.floor(Date.now() / bucketMs);
  let s = bucket;
  for (const c of id) s = (s * 31 + c.charCodeAt(0)) >>> 0;
  return () => {
    s = (s * 1664525 + 1013904223) >>> 0;
    return (s & 0xffffffff) / 0x100000000;
  };
}

function getTargetStats(venue, date) {
  const dispDate = getDisplayTime(date);
  const activity = getActivityLevel(dispDate, venue);
  const rand = seededRand(venue.id);
  const crowd = Math.max(2, Math.round(260 * venue.pop * activity + (rand() - 0.5) * 14));
  const capacity = 220 * venue.pop;
  const fill = Math.min(1, crowd / capacity);
  const openSeats = Math.max(0, Math.round((1 - fill) * 18 + rand() * 2));
  let girlsRatio = 0.46;
  if (venue.type === 'wine')    girlsRatio = 0.54;
  if (venue.type === 'french')  girlsRatio = 0.55;
  if (venue.type === 'whiskey') girlsRatio = 0.38;
  if (venue.type === 'rooftop') girlsRatio = 0.50;
  if (venue.type === 'cafe')    girlsRatio = 0.52;
  girlsRatio += (rand() - 0.5) * 0.04;
  girlsRatio = Math.max(0.30, Math.min(0.70, girlsRatio));
  const girlsPct = Math.round(girlsRatio * 100);
  const guysPct = 100 - girlsPct;
  const groupsHigh = activity > 0.78;
  const groupsMid  = activity > 0.45;
  const girlsInGroups = girlsRatio > 0.48 && groupsHigh ? 'High' : groupsMid ? 'Medium' : 'Low';
  const guysInGroups  = !groupsHigh && groupsMid ? 'Medium' : groupsHigh ? 'High' : 'Low';
  const soloWomen     = girlsRatio > 0.5 && activity > 0.6 ? 'Medium' : activity > 0.4 ? 'Low' : 'Sparse';
  const soloMen       = activity > 0.6 ? 'Medium' : activity > 0.3 ? 'Low' : 'Sparse';
  const couples       = (venue.type === 'french' || venue.type === 'wine') && activity > 0.4 ? 'Medium'
                      : activity > 0.55 ? 'Low' : 'Sparse';
  const socialVibe    = activity > 0.78 ? 'Easy to mingle'
                      : activity > 0.5  ? 'Warming up'
                      : activity > 0.2  ? 'Mellow' : 'Quiet';
  const tinderTotal = Math.max(0, Math.round(crowd * (0.115 + (rand() - 0.5) * 0.015)));
  const tinderRatio = 0.56 + (rand() - 0.5) * 0.04;
  const tinderGuys  = Math.round(tinderTotal * tinderRatio);
  const tinderGirls = Math.max(0, tinderTotal - tinderGuys);
  const bumbleTotal = Math.max(0, Math.round(crowd * (0.085 + (rand() - 0.5) * 0.015)));
  const bumbleRatio = 0.56 + (rand() - 0.5) * 0.04;
  const bumbleGirls = Math.round(bumbleTotal * bumbleRatio);
  const bumbleGuys  = Math.max(0, bumbleTotal - bumbleGirls);
  const hingeTotal  = Math.max(0, Math.round(crowd * (0.105 + (rand() - 0.5) * 0.015)));
  const hingeRatio  = 0.515 + (rand() - 0.5) * 0.03;
  const hingeGirls  = Math.round(hingeTotal * hingeRatio);
  const hingeGuys   = Math.max(0, hingeTotal - hingeGirls);

  return {
    crowd, openSeats, guysPct, girlsPct,
    girlsInGroups, guysInGroups, soloWomen, soloMen, couples, socialVibe,
    tinder: { total: tinderTotal, guys: tinderGuys, girls: tinderGirls },
    bumble: { total: bumbleTotal, guys: bumbleGuys, girls: bumbleGirls },
    hinge:  { total: hingeTotal,  guys: hingeGuys,  girls: hingeGirls },
    activity,
  };
}

function walk(current, target, drift = 0.18, jitter = 1.0) {
  const cur = current ?? target;
  const step = (target - cur) * drift + (Math.random() - 0.5) * jitter;
  return Math.max(0, Math.round(cur + step));
}

function tickSimulation() {
  state.now = new Date();
  const ctx = getTimeContext(state.now);
  for (const v of VENUES) {
    const t = getTargetStats(v, state.now);
    const cur = liveValues[v.id];
    if (!ctx.isLive || !cur) { liveValues[v.id] = t; continue; }
    const crowd = walk(cur.crowd, t.crowd, 0.12, 1.2);
    const tinderTotal = walk(cur.tinder.total, t.tinder.total, 0.18, 0.55);
    const bumbleTotal = walk(cur.bumble.total, t.bumble.total, 0.18, 0.45);
    const hingeTotal  = walk(cur.hinge.total,  t.hinge.total,  0.18, 0.45);
    const tinderRatio = t.tinder.total > 0 ? t.tinder.guys / t.tinder.total : 0.56;
    const bumbleRatio = t.bumble.total > 0 ? t.bumble.girls / t.bumble.total : 0.56;
    const hingeRatio  = t.hinge.total  > 0 ? t.hinge.girls  / t.hinge.total  : 0.515;
    const tinderGuys = Math.round(tinderTotal * tinderRatio);
    const bumbleGirls = Math.round(bumbleTotal * bumbleRatio);
    const hingeGirls  = Math.round(hingeTotal  * hingeRatio);
    liveValues[v.id] = {
      crowd, openSeats: walk(cur.openSeats, t.openSeats, 0.25, 0.4),
      guysPct: t.guysPct, girlsPct: t.girlsPct,
      girlsInGroups: t.girlsInGroups, guysInGroups: t.guysInGroups,
      soloWomen: t.soloWomen, soloMen: t.soloMen, couples: t.couples, socialVibe: t.socialVibe,
      tinder: { total: tinderTotal, guys: tinderGuys, girls: tinderTotal - tinderGuys },
      bumble: { total: bumbleTotal, guys: bumbleTotal - bumbleGirls, girls: bumbleGirls },
      hinge:  { total: hingeTotal,  guys: hingeTotal  - hingeGirls,  girls: hingeGirls },
      activity: t.activity,
    };
  }
}

const APPS = {
  all:    { label: 'All apps', short: 'All',    color: '#ffffff' },
  tinder: { label: 'Tinder',   short: 'Tinder', color: '#fb7185' },
  bumble: { label: 'Bumble',   short: 'Bumble', color: '#facc15' },
  hinge:  { label: 'Hinge',    short: 'Hinge',  color: '#a78bfa' },
};

function getAppCount(stats, app = state.app) {
  if (app === 'all') return stats.tinder.total + stats.bumble.total + stats.hinge.total;
  return stats[app].total;
}
function getAppRatio(stats, app = state.app) {
  if (app === 'all') {
    const guys  = stats.tinder.guys  + stats.bumble.guys  + stats.hinge.guys;
    const girls = stats.tinder.girls + stats.bumble.girls + stats.hinge.girls;
    return { guys, girls, total: guys + girls };
  }
  return { guys: stats[app].guys, girls: stats[app].girls, total: stats[app].total };
}
function totalForCurrentApp() {
  return Object.values(liveValues).reduce((s, v) => s + getAppCount(v), 0);
}
function totalGenderForCurrentApp() {
  return Object.values(liveValues).reduce((acc, v) => {
    const r = getAppRatio(v);
    acc.guys += r.guys; acc.girls += r.girls; return acc;
  }, { guys: 0, girls: 0 });
}
function totalCrowd() { return Object.values(liveValues).reduce((s, v) => s + v.crowd, 0); }

/* ==========================================================
   AI RECOMMENDATION — Marx Cafe with adaptive reasoning
   ========================================================== */
function generateRecommendation() {
  const venue = VENUES.find(v => v.id === 'marx-cafe');
  const stats = liveValues[venue.id];
  if (!stats) return { venue, lines: [] };

  const ctx = getTimeContext(state.now);
  const ratio = getAppRatio(stats);
  const total = ratio.total || 1;
  const girlsPct = Math.round((ratio.girls / total) * 100);
  const guysPct = 100 - girlsPct;

  const lines = [];

  // Time-based "why now"
  if (ctx.mode === 'preopen' || ctx.mode === 'building') {
    lines.push(`It's still early — Marx peaks later than the 14th St crowd, so you'll find seats now and the room fills around 10:30.`);
  } else if (ctx.mode === 'heating') {
    lines.push(`Marx is hitting its stride right now. Smaller room than Service Bar or Le Dip, so the energy stays concentrated instead of diluted.`);
  } else if (ctx.mode === 'peak' || ctx.mode === 'late-peak') {
    lines.push(`While the U Street corridor is at capacity, Marx is full but breathable — you can actually have a conversation without yelling.`);
  } else if (!ctx.isLive) {
    lines.push(`Tonight's forecast: Marx hits a strong second half — its eclectic regulars plus spillover from 14th St make it a sleeper after 10:30.`);
  } else {
    lines.push(`Marx winds down at a friendlier pace than the bigger spots — last-call atmosphere without the chaos.`);
  }

  // App-aware crowd composition
  if (state.app === 'bumble' && girlsPct >= 50) {
    lines.push(`Bumble skews female here (${girlsPct}/${guysPct}) — better-than-average odds vs. the citywide split.`);
  } else if (state.app === 'hinge') {
    lines.push(`Hinge users at Marx tend to be the conversation-first type. The eclectic vibe self-selects for it.`);
  } else if (state.app === 'tinder') {
    lines.push(`Tinder activity here is steadier than at the loud rooftops — fewer matches but higher response rates on similar nights.`);
  } else {
    lines.push(`Across all three apps, Marx draws a creative, mid-20s-to-30s crowd that actually replies.`);
  }

  // Rotating closer
  const closers = [
    `Plus the back patio just opened up for the season.`,
    `Worth the trip uphill from the metro.`,
    `Strong cocktail program for a place that doesn't take itself too seriously.`,
    `The owner's playlist alone is reason to stop in.`,
  ];
  const seedIdx = Math.floor(Date.now() / 60000) % closers.length;
  lines.push(closers[seedIdx]);

  return { venue, lines };
}

function generateAiResponse(userText) {
  const t = userText.toLowerCase();
  const recVenue = VENUES.find(v => v.id === 'marx-cafe');

  // "See if anyone is interested in meeting me" / find-someone
  if (/(anyone\s+(want|interested|down|free|around)|find\s+(me\s+)?(someone|people)|who\s+(wants|wanna|would)\s+(to\s+)?meet|meet\s+(me|someone)|set\s+me\s+up|match\s+me|hook\s+me\s+up|interest(ed)?\s+in\s+me)/i.test(t)) {
    // Check profile completeness
    const has = (f) => userProfile[f] !== '' && userProfile[f] != null;
    const missing = [];
    if (!has('age'))         missing.push('age');
    if (!has('gender'))      missing.push('gender');
    if (!has('lookingFor'))  missing.push('who you\'re looking for');

    if (missing.length) {
      return `I can do that — but first I need a few things from your profile so I'm pinging the right people: ${missing.join(', ')}. Tap Profile in the bottom nav (takes 30 seconds), then ask me again.`;
    }

    const lookFor = userProfile.lookingFor === 'everyone' ? 'people' :
                    userProfile.lookingFor === 'women' ? 'women' :
                    userProfile.lookingFor === 'men' ? 'men' : 'people';
    const ageRange = `${userProfile.ageMin}–${userProfile.ageMax}`;
    const radius = userProfile.maxDistance;
    const name = userProfile.name || 'you';
    const intent = (userProfile.tonightIntent || '').trim();

    // Pick top-2 venues by current count for the relevant app
    const top = VENUES.map(v => ({ ...v, stats: liveValues[v.id] }))
      .sort((a, b) => getAppCount(b.stats) - getAppCount(a.stats))
      .slice(0, 2);
    const venueNames = top.map(v => v.name).join(' and ');

    const intentLine = intent
      ? ` I'll filter for people whose vibe matches what you wrote ("${intent.length > 60 ? intent.slice(0, 60) + '…' : intent}").`
      : '';

    return `On it. Sending a soft ping to ${lookFor} aged ${ageRange} within ${radius} mi who are at ${venueNames} right now. Profile shown: ${name}, ${userProfile.age}${userProfile.heightFt ? `, ${userProfile.heightFt}'${userProfile.heightIn || 0}"` : ''}.${intentLine} First responses usually come back in 5–10 min — I'll DM you when someone bites.`;
  }

  // "Let people know I'll be coming at X"
  if (/(let|tell|notify|broadcast|heads?\s*up|coming|arriv|i'?ll\s*be|ill\s*be|on\s*my\s*way|gonna\s*be|reaching|stopping\s*by)/i.test(t)) {
    // Extract a time
    const tm = t.match(/\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\b/);
    const timeStr = tm ? `${tm[1]}${tm[2] ? ':' + tm[2] : ''} ${tm[3] || (parseInt(tm[1]) < 8 ? 'PM' : '')}`.trim() : null;
    // Extract a venue mention
    const v = VENUES.find(vv => t.includes(vv.name.toLowerCase()) || t.includes(vv.id));
    const venue = v || recVenue;

    if (timeStr) {
      return `Done — I let folks at ${venue.name} know to expect you at ${timeStr}. ${venue.id === 'marx-cafe' ? 'The room fills around 10:30, so 7 means you\'ll grab a good seat at the bar before the rush.' : 'I\'ll send a reminder 15 min before.'} Want me to set a reminder?`;
    }
    return `Got it — heads-up sent to folks at ${venue.name}. When are you planning to arrive? I'll fine-tune the broadcast.`;
  }

  // What to wear
  if (/\b(wear|outfit|dress|look|attire)\b/.test(t)) {
    return `Marx is casual — flannels, jeans, sneakers all work. Crowd skews creative/eclectic, so don't overthink it. Skip the blazer unless you're heading somewhere else after.`;
  }

  // When to go
  if (/(what|best)\s*time|when\s*(should|to|do)|\b(early|late|good time|peak)\b/i.test(t)) {
    const tilPeak = timeUntilPeak(state.now);
    return `Right now activity is at ${Math.round(getActivityLevel(state.now) * 100)}%${tilPeak ? `, peak hits in ${tilPeak}` : ''}. For Marx specifically: 7 is early-quiet (good for seats), 9–10 is the sweet spot, 11+ gets loud.`;
  }

  // Where to go / general recs
  if (/(where|recommend|suggestion|spot|bar|tonight)\b/.test(t) && !/where\s+is/i.test(t)) {
    const intent = (userProfile.tonightIntent || '').toLowerCase();
    if (intent) {
      // Pick venue that best matches the intent keywords
      let pick = 'marx-cafe';
      if (/dance|loud|energy|party|hype|busy|packed|wild/.test(intent))         pick = 'service-bar';
      else if (/quiet|chill|conversation|talk|mellow|low.?key|relax/.test(intent)) pick = 'marx-cafe';
      else if (/date|romantic|wine|dinner|fancy/.test(intent))                  pick = 'le-diplomate';
      else if (/whiskey|scotch|bourbon|cigar|classy|old.?school/.test(intent))   pick = 'jack-rose';
      else if (/rooftop|view|outside|patio|fresh.?air/.test(intent))             pick = 'el-techo';
      const v = VENUES.find(x => x.id === pick);
      return `Based on what you wrote ("${(userProfile.tonightIntent || '').length > 50 ? userProfile.tonightIntent.slice(0, 50) + '…' : userProfile.tonightIntent}") — try ${v.name} (${v.neighborhood}). It's the closest fit. Tap the pin on the map for live counts.`;
    }
    return `Top pick: Marx Cafe (Mt Pleasant) — small, eclectic, conversation-friendly. If you want bigger energy: Service Bar DC (U Street). Le Diplomate (14th St) for a date. Tap the map pins for live counts.`;
  }

  // How to get there
  if (/\b(park|parking|metro|uber|drive|directions|how\s*do\s*i\s*get)\b/.test(t)) {
    return `Marx is ~10 min walk from Columbia Heights metro. Street parking on Mt Pleasant Rd usually opens up after 10. Uber from Logan Circle is around $8.`;
  }

  // Drinks / menu
  if (/\b(drink|cocktail|menu|beer|food|eat|kitchen)\b/.test(t)) {
    return `Marx has a strong cocktail program — Old Fashioned variants are reliable. Solid beer selection, fair prices for DC. Kitchen's small but the bar snacks hold up.`;
  }

  // Crowd / who's there
  if (/\b(crowd|who|busy|packed|empty|people|girls|guys|men|women)\b/.test(t)) {
    const stats = liveValues['marx-cafe'];
    const ratio = getAppRatio(stats);
    return `Marx right now: ~${stats.crowd} people, ${ratio.guys} guys / ${ratio.girls} girls on ${APPS[state.app].label}. Vibe is ${stats.socialVibe.toLowerCase()}. Mostly mid-20s to mid-30s.`;
  }

  // Greeting / thanks
  if (/^(hi|hey|hello|sup|yo|thanks|thank you|thx)\b/.test(t)) {
    return `Hey! What can I help with — recs, timing, broadcasting your arrival, or just venue intel?`;
  }

  // Default
  return `I can help with venue recommendations, when to go, what to wear, parking, or even letting folks at a spot know you're on the way. What's the situation?`;
}

function hexToRgba(hex, a) {
  if (hex === '#ffffff') return `rgba(255,255,255,${a})`;
  const m = hex.match(/^#([0-9a-f]{6})$/i);
  if (!m) return hex;
  const n = parseInt(m[1], 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

/* ==========================================================
   GENDER DONUT — circle-bar style for guys vs girls
   ========================================================== */
function genderDonut(stats, app = state.app, size = 28) {
  const r = getAppRatio(stats, app);
  const total = (r.guys + r.girls) || 1;
  const guysPct = (r.guys / total) * 100;
  const strokeW = Math.max(2.5, size * 0.18);
  const radius = (size / 2) - strokeW / 2 - 0.5;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * radius;
  const guysLen = (guysPct / 100) * circ;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;display:block;">
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="url(#gd-girls)" stroke-width="${strokeW}"/>
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="url(#gd-guys)" stroke-width="${strokeW}"
              stroke-dasharray="${guysLen} ${circ - guysLen}"
              transform="rotate(90 ${cx} ${cy})"/>
    </svg>`;
}

// Donut + flanking colored numbers, used everywhere a gender breakdown is shown
function genderCluster(stats, app, opts = {}) {
  const { size = 26, prefix = '', textSize = 11, gap = 6 } = opts;
  const r = getAppRatio(stats, app);
  return `
    <div class="flex items-center" style="gap:${gap}px;">
      <span class="tabular" style="color:#60a5fa;font-weight:700;font-size:${textSize}px;line-height:1;">${prefix}${r.guys}</span>
      ${genderDonut(stats, app, size)}
      <span class="tabular" style="color:#fb7185;font-weight:700;font-size:${textSize}px;line-height:1;">${prefix}${r.girls}</span>
    </div>`;
}

// Solid-color donut for Leaflet pin (where url() refs to body-level defs work but using solid is safer)
function genderDonutSolid(guys, girls, size = 18) {
  const total = (guys + girls) || 1;
  const guysPct = (guys / total) * 100;
  const strokeW = Math.max(2.5, size * 0.22);
  const radius = (size / 2) - strokeW / 2 - 0.5;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * radius;
  const guysLen = (guysPct / 100) * circ;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;">
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#f43f5e" stroke-width="${strokeW}"/>
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#3b82f6" stroke-width="${strokeW}"
              stroke-dasharray="${guysLen} ${circ - guysLen}"
              transform="rotate(90 ${cx} ${cy})"/>
    </svg>`;
}

/* ==========================================================
   Tonight's Timeline curve
   ========================================================== */
function tonightTimelineSvg(date, venue = null) {
  const w = 320, h = 56;
  const startH = 17, endH = 27, steps = 50;
  let pts = [];
  for (let i = 0; i <= steps; i++) {
    const hour = startH + (i / steps) * (endH - startH);
    const sample = new Date(date);
    const realHour = hour >= 24 ? hour - 24 : hour;
    sample.setHours(Math.floor(realHour));
    sample.setMinutes(Math.round((realHour % 1) * 60));
    sample.setSeconds(0);
    const a = getActivityLevel(sample, venue);
    const x = (i / steps) * w;
    const y = (h - 4) - a * (h - 8);
    pts.push([x, y]);
  }
  const pathD = pts.map((p, i) => (i === 0 ? `M ${p[0]} ${p[1]}` : `L ${p[0]} ${p[1]}`)).join(' ');
  const fillD = `${pathD} L ${w} ${h} L 0 ${h} Z`;
  const cur = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;
  const adj = cur < 4 ? cur + 24 : cur;
  const inRange = adj >= startH && adj <= endH;
  const nowFrac = Math.max(0, Math.min(1, (adj - startH) / (endH - startH)));
  const nowX = nowFrac * w;
  const nowY = (h - 4) - getActivityLevel(date, venue) * (h - 8);
  const labels = [
    [(18 - startH) / (endH - startH) * w, '6P'],
    [(20 - startH) / (endH - startH) * w, '8P'],
    [(22 - startH) / (endH - startH) * w, '10P'],
    [(24 - startH) / (endH - startH) * w, '12A'],
    [(26 - startH) / (endH - startH) * w, '2A'],
  ];
  const labelMarks = labels.map(([x, t]) => `<text x="${x}" y="${h}" text-anchor="middle" font-size="8" fill="#475569">${t}</text>`).join('');
  return `
    <svg viewBox="0 0 ${w} ${h + 8}" preserveAspectRatio="none" class="w-full" style="height:${h + 8}px;">
      <defs>
        <linearGradient id="curve-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(167,139,250,0.45)"/>
          <stop offset="100%" stop-color="rgba(167,139,250,0)"/>
        </linearGradient>
      </defs>
      <path d="${fillD}" fill="url(#curve-fill)"/>
      <path d="${pathD}" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${inRange ? `
        <line x1="${nowX}" y1="0" x2="${nowX}" y2="${h - 4}" stroke="#fb7185" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
        <circle cx="${nowX}" cy="${nowY}" r="9" fill="#fb7185" opacity="0.25" class="live-ping"/>
        <circle cx="${nowX}" cy="${nowY}" r="4" fill="#fb7185" stroke="#fff" stroke-width="1.2"/>
      ` : ''}
      ${labelMarks}
    </svg>`;
}

  return `<svg viewBox="0 0 60 60" class="absolute inset-0 w-full h-full">

          <h3 class="text-white text-sm font-semibold uppercase tracking-wider">Preferences</h3>
        </div>

        <div class="space-y-3">
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <span class="${labelCls.replace('mb-1.5','')}">Age range</span>
              <span class="text-violet-200 text-xs font-bold tabular">${userProfile.ageMin}–${userProfile.ageMax}</span>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <input type="number" data-profile-field="ageMin" value="${userProfile.ageMin}" min="18" max="80"
                     class="${inputCls} tabular text-center" style="${inputStyle}" placeholder="Min"/>
              <input type="number" data-profile-field="ageMax" value="${userProfile.ageMax}" min="18" max="99"
                     class="${inputCls} tabular text-center" style="${inputStyle}" placeholder="Max"/>
            </div>
          </div>

          <div>
            <div class="flex items-center justify-between mb-1.5">
              <span class="${labelCls.replace('mb-1.5','')}">Max distance</span>
              <span class="text-violet-200 text-xs font-bold tabular">${userProfile.maxDistance} mi</span>
            </div>
            <input type="range" data-profile-field="maxDistance" value="${userProfile.maxDistance}" min="1" max="25" step="1"
                   class="w-full" style="accent-color:#a78bfa;"/>
            <div class="flex justify-between text-slate-500 text-[10px] mt-0.5">
              <span>1 mi</span><span>25 mi</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Live stats summary (existing context cards) -->
      <div class="grid grid-cols-2 gap-2 mb-3">
        <div class="pred-card rounded-2xl p-4" style="background:${hexToRgba(a.color, 0.10)};border:1px solid ${hexToRgba(a.color, 0.25)};">
          <div class="flex items-center gap-1.5 mb-1">${icons[state.app](14)}<span class="text-[10px] uppercase tracking-wider font-semibold" style="color:${a.color}">${ctx.isLive ? `On ${a.short}` : `Tonight on ${a.short}`}</span></div>
          <div class="flex items-center gap-2">
            <div class="text-white font-bold text-2xl tabular">${numberPrefix}${total}</div>
            ${genderDonut(totalsAsStats, 'tinder', 32)}
          </div>
          <div class="flex items-center gap-1.5 mt-1 tabular text-[10px]">
            <span style="color:#60a5fa;font-weight:700">${numberPrefix}${totalGen.guys}</span>
            <span style="color:#475569">guys ·</span>
            <span style="color:#fb7185;font-weight:700">${numberPrefix}${totalGen.girls}</span>
            <span style="color:#475569">girls</span>
          </div>
        </div>
        <div class="pred-card rounded-2xl p-4" style="background:rgba(167,139,250,0.10);border:1px solid rgba(167,139,250,0.25);">
          <div class="flex items-center gap-1.5 mb-1">${icons.users(14,'#ec4899')}<span class="text-violet-300 text-[10px] uppercase tracking-wider font-semibold">Total crowd</span></div>
          <div class="text-white font-bold text-2xl tabular">${numberPrefix}${totalCrowd()}</div>
          <div class="text-slate-400 text-[10px]">across ${VENUES.length} venues</div>
        </div>
      </div>

      <div class="text-slate-500 text-[10px] text-center mt-4 mb-2">
        Profile saved locally on this device
      </div>
    </div>`;
}

/* ==========================================================
   BOTTOM NAV
   ========================================================== */
function bottomNavHtml() {
  const tabs = [
    { id: 'map', label: 'Map', key: 'map' },
    { id: 'hotspots', label: 'Hotspots', key: 'flame' },
    { id: 'venues', label: 'Venues', key: 'martini' },
    { id: 'profile', label: 'Profile', key: 'user' },
  ];
  const items = tabs.map(t => {
    const active = state.tab === t.id;
    const color = active ? '#a78bfa' : '#94a3b8';
    let ic;
    if (t.key === 'flame') ic = icons.flame(22, color);
    else if (t.key === 'map') ic = `<span style="color:${color}">${icons.map(22)}</span>`;
    else if (t.key === 'martini') ic = `<span style="color:${color}">${icons.martini(22)}</span>`;
    else ic = `<span style="color:${color}">${icons.user(22)}</span>`;
    return `
      <button data-action="set-tab" data-tab="${t.id}" class="flex flex-col items-center gap-0.5 py-1 px-3">
        ${ic}
        <span class="text-[10px] ${active ? 'text-violet-400 font-semibold' : 'text-slate-400'}">${t.label}</span>
      </button>`;
  }).join('');
  return `
    <div class="w-full" style="background:rgba(11,9,22,0.92);border-top:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(16px);">
      <div class="flex items-center justify-around px-2 pt-2 pb-6">${items}</div>
    </div>`;
}

/* ==========================================================
   LEAFLET MAP
   ========================================================== */
let map = null, heatLayer = null;
let markerObjs = [];

function initMap() {
  map = L.map('map', {
    zoomControl: false, attributionControl: false,
    scrollWheelZoom: true, doubleClickZoom: true, boxZoom: false,
  }).setView([38.9101, -77.025], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd',
  }).addTo(map);
  L.control.attribution({ position: 'bottomleft', prefix: '' }).addAttribution('© OSM · CARTO').addTo(map);
  document.getElementById('map-loading')?.remove();
  initHeatLayer();
  rebuildMarkers();
  updateMapData();
}

function initHeatLayer() {
  if (heatLayer) map.removeLayer(heatLayer);
  heatLayer = L.heatLayer([], {
    radius: 55, blur: 38, maxZoom: 17, max: 1.0, minOpacity: 0.35,
    gradient: { 0.0:'rgba(80,30,160,0)', 0.2:'#5b21b6', 0.4:'#be185d', 0.6:'#dc2626', 0.8:'#ea580c', 1.0:'#facc15' },
  }).addTo(map);
}

function rebuildMarkers() {
  if (!map) return;
  markerObjs.forEach(m => map.removeLayer(m.marker));
  markerObjs = [];
  const a = APPS[state.app];
  const ctx = getTimeContext(state.now);
  const numberPrefix = ctx.isLive ? '' : '~';
  const borderStyle = ctx.isLive ? 'solid' : 'dashed';

  VENUES.forEach(v => {
    const stats = liveValues[v.id] || { tinder:{total:0,guys:0,girls:0}, bumble:{total:0,guys:0,girls:0}, hinge:{total:0,guys:0,girls:0} };
    const count = getAppCount(stats);
    const r = getAppRatio(stats);

    const appIcon =
      state.app === 'tinder' ? `<svg width="8" height="8" viewBox="0 0 24 24"><path d="M12 2c2 5 6 6 6 11a6 6 0 0 1-12 0c0-3 2-5 3-7 1 1 1 3 2 4 0-3-1-6 1-8z" fill="${a.color}"/></svg>`
    : state.app === 'bumble' ? `<svg width="8" height="8" viewBox="0 0 24 24"><polygon points="12,2 22,7 22,17 12,22 2,17 2,7" fill="${a.color}"/></svg>`
    : state.app === 'hinge'  ? `<svg width="8" height="8" viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12" stroke="${a.color}" stroke-width="3" stroke-linecap="round" fill="none"/></svg>`
    : `<svg width="8" height="8" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="3" fill="#fb7185"/><circle cx="12" cy="12" r="3" fill="#facc15"/><circle cx="18" cy="12" r="3" fill="#a78bfa"/></svg>`;

    const html = `
      <div data-marker-id="${v.id}" style="position:relative;display:flex;flex-direction:column;align-items:center;transform:translateY(-4px);cursor:pointer;">
        <div style="
          display:flex;align-items:center;gap:4px;
          background:rgba(15,10,30,0.94);
          border:1px ${borderStyle} ${hexToRgba(a.color, 0.5)};
          border-radius:999px;
          padding:3px 7px 3px 5px;
          box-shadow:0 4px 12px rgba(124,58,237,0.3), 0 2px 5px rgba(0,0,0,0.5);
          white-space:nowrap;margin-bottom:3px;
        ">
          <span style="display:inline-flex;align-items:center;">${icons.wingBadge(11)}</span>
          <span style="color:#fff;font-size:10px;font-weight:600;">${v.name}</span>
          <span style="display:inline-flex;align-items:center;gap:2px;color:${a.color};font-size:10px;font-weight:700;margin-left:2px;">
            ${appIcon}<span data-count>${numberPrefix}${count}</span>
          </span>
        </div>
        <div style="width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7c3aed);border:2px solid #fff;box-shadow:0 0 12px rgba(167,139,250,0.7), 0 2px 5px rgba(0,0,0,0.5);"></div>
      </div>`;

    const icon = L.divIcon({ html, className: 'wing-pin-wrap', iconSize: [160, 36], iconAnchor: [80, 36] });
    const marker = L.marker([v.lat, v.lng], { icon, riseOnHover: true }).addTo(map);
    marker.on('click', () => selectVenue(v.id));

    const root = marker._icon;
    markerObjs.push({
      marker, venueId: v.id,
      countEl: root?.querySelector('[data-count]'),
      guysEl:  root?.querySelector('[data-guys]'),
      girlsEl: root?.querySelector('[data-girls]'),
      donutEl: root?.querySelector('[data-donut]'),
    });
  });
}

function updateMarkerCounts() {
  const ctx = getTimeContext(state.now);
  const numberPrefix = ctx.isLive ? '' : '~';
  for (const m of markerObjs) {
    if (!m.countEl) {
      m.countEl = m.marker._icon?.querySelector('[data-count]');
      m.guysEl  = m.marker._icon?.querySelector('[data-guys]');
      m.girlsEl = m.marker._icon?.querySelector('[data-girls]');
      m.donutEl = m.marker._icon?.querySelector('[data-donut]');
      if (!m.countEl) continue;
    }
    const stats = liveValues[m.venueId];
    const r = getAppRatio(stats);
    const newCount = `${numberPrefix}${getAppCount(stats)}`;
    const newGuys  = `${numberPrefix}${r.guys}`;
    const newGirls = `${numberPrefix}${r.girls}`;
    if (m.countEl.textContent !== newCount) m.countEl.textContent = newCount;
    if (m.guysEl  && m.guysEl.textContent  !== newGuys)  m.guysEl.textContent  = newGuys;
    if (m.girlsEl && m.girlsEl.textContent !== newGirls) m.girlsEl.textContent = newGirls;
    if (m.donutEl) m.donutEl.innerHTML = genderDonutSolid(r.guys, r.girls, 16);
  }
}

function updateHeatmap() {
  if (!heatLayer) return;
  const points = VENUES.map(v => {
    const s = liveValues[v.id];
    const w = (s?.activity || 0) * (0.4 + v.pop * 0.6);
    return [v.lat, v.lng, Math.max(0.05, Math.min(1, w))];
  });
  heatLayer.setLatLngs(points);
}

function updateMapData() { updateMarkerCounts(); updateHeatmap(); }

/* ==========================================================
   RENDER
   ========================================================== */
function applyPredictionMode() {
  const ctx = getTimeContext(state.now);
  document.body.classList.toggle('prediction-mode', !ctx.isLive);
  if (lastIsLive !== null && lastIsLive !== ctx.isLive) rebuildMarkers();
  lastIsLive = ctx.isLive;
}

function renderShell() {
  document.getElementById('header').innerHTML = headerHtml();
  document.getElementById('bottom-nav').innerHTML = bottomNavHtml();
  applyPredictionMode();
}

function renderTabContent() {
  const showMap = state.tab === 'map';
  const mapSection = document.getElementById('map-section');
  const content = document.getElementById('content');
  mapSection.style.display = showMap ? 'block' : 'none';
  content.style.display = showMap ? 'none' : 'block';
  if (showMap) {
    document.getElementById('sheet-content').innerHTML = mapTabHtml();
    applySheetState();
  } else {
    if (state.tab === 'hotspots') content.innerHTML = hotspotsTabHtml();
    else if (state.tab === 'venues')   content.innerHTML = venueDetailHtml();
    else if (state.tab === 'profile')  content.innerHTML = profileTabHtml();
  }
  if (showMap && map) setTimeout(() => map.invalidateSize(), 0);
}

function fullRender() {
  renderShell();
  renderTabContent();
  updateMapData();
}

/* ==========================================================
   EVENT HANDLERS
   ========================================================== */
function selectVenue(id) {
  state.selectedId = id;
  state.tab = 'venues';
  fullRender();
  document.getElementById('scroll-container').scrollTop = 0;
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'set-tab') {
    state.tab = btn.dataset.tab;
    fullRender();
    document.getElementById('scroll-container').scrollTop = 0;
  } else if (action === 'set-app') {
    state.app = btn.dataset.app;
    fullRender();
    rebuildMarkers();
  } else if (action === 'select-venue') {
    selectVenue(btn.dataset.id);
  } else if (action === 'toggle-sheet') {
    toggleSheet();
  } else if (action === 'open-chat') {
    e.stopPropagation();
    openChat();
  } else if (action === 'close-chat') {
    closeChat();
  } else if (action === 'send-suggestion') {
    sendChatMessage(btn.dataset.text);
  }
});

// Profile input handler — saves on every change
document.addEventListener('input', (e) => {
  const field = e.target.dataset.profileField;
  if (!field) return;
  let val = e.target.value;
  // Coerce numerics
  if (['age','heightFt','heightIn','ageMin','ageMax','maxDistance'].includes(field)) {
    val = val === '' ? '' : Number(val);
  }
  userProfile[field] = val;
  saveProfile();
  // Update dependent UI bits without rebuilding the whole form (would lose focus)
  updateProfileSidecars();
});

function updateProfileSidecars() {
  // Update completion bar live
  const meter = document.querySelector('[data-completion-bar]');
  const meterText = document.querySelector('[data-completion-text]');
  if (meter && meterText) {
    const pct = profileCompletion();
    meter.style.width = pct + '%';
    meterText.textContent = pct + '%';
  }
}

// Chat form submit
document.addEventListener('submit', (e) => {
  if (e.target.id !== 'chat-form') return;
  e.preventDefault();
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value;
  input.value = '';
  sendChatMessage(text);
});

/* ==========================================================
   TICK
   ========================================================== */
function tick() {
  tickSimulation();
  const headerClock = document.getElementById('header-clock');
  if (headerClock) headerClock.textContent = fmtTimeShort(state.now);
  const tickerTotal = document.getElementById('ticker-total');
  if (tickerTotal) {
    const ctx = getTimeContext(state.now);
    const prefix = ctx.isLive ? '' : '~';
    tickerTotal.textContent = `${prefix}${totalForCurrentApp()}`;
  }
  const nowClock = document.getElementById('now-clock');
  if (nowClock) nowClock.textContent = fmtTime(state.now);
  const profileClock = document.getElementById('profile-clock');
  if (profileClock) profileClock.textContent = fmtTime(state.now);

  applyPredictionMode();
  updateMapData();

  if (state.tab === 'venues') {
    renderTabContent();
  } else if (state.tab === 'profile') {
    // Don't re-render — would lose input focus. Just update the live stats inline.
  } else if (Date.now() - lastListRefresh > 3000) {
    renderTabContent();
    lastListRefresh = Date.now();
  }
}

/* ==========================================================
   INIT
   ========================================================== */
loadProfile();
tickSimulation();
fullRender();

function tryInitMap() {
  if (typeof L === 'undefined' || !L.heatLayer) return setTimeout(tryInitMap, 100);
  initMap();
}
tryInitMap();

setInterval(tick, 1000);
</script>
</body>
</html>
