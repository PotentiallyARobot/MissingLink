<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>missinglink — modelgen</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/favicon.png">
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<style>
:root{
  --gold:#E8A917;--gold-light:#F5C842;--gold-dark:#C48E0E;--gold-dim:rgba(232,169,23,.08);
  --black:#09090B;--surface:#111113;--surface-2:#18181B;--surface-3:#1F1F23;
  --border:#27272A;--border-light:#3F3F46;
  --white:#FAFAF9;--text:#E4E4E7;--text-dim:#A1A1AA;--text-muted:#71717A;
  --red:#EF4444;--green:#22C55E;--blue:#3B82F6;
  --font-display:'Space Mono','JetBrains Mono',monospace;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
  --font-body:'DM Sans','Segoe UI',sans-serif;
  --sidebar-w:320px;--header-h:48px;
}
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box}
html,body{height:100%;overflow:hidden;margin:0}
body{background:var(--black);color:var(--text);font-family:var(--font-body);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr;grid-template-areas:"header header" "sidebar main";height:100vh;width:100vw;overflow:hidden}

/* ── HEADER ─────────────────────────────────────────────── */
.app-header{grid-area:header;display:flex;align-items:center;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:100;gap:10px}
.app-header .logo{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.app-header .logo svg{width:100%;height:100%;fill:var(--gold)}
.app-header h1{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin:0}
.app-header h1 span{color:var(--gold)}
.app-header .spacer{flex:1}

.hdr-badge{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:3px 8px;border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;gap:5px;min-width:115px;justify-content:flex-start;white-space:nowrap}
.hdr-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);transition:background .3s}
.hdr-badge .dot.warming{background:var(--gold);animation:pulse 1.4s infinite}
.hdr-badge .dot.ready{background:var(--green);animation:pulse 2s infinite}
.hdr-badge .dot.cold{background:var(--text-muted)}
.hdr-badge .dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.hdr-link{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:4px;transition:.15s}
.hdr-link:hover{border-color:var(--gold);color:var(--gold)}

.token-badge{cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:600;padding:4px 10px;border:1px solid var(--gold);border-radius:4px;background:var(--gold-dim);color:var(--gold);transition:.15s}
.token-badge:hover{background:var(--gold);color:var(--black)}

.user-pill{display:flex;align-items:center;gap:8px;padding:2px 4px 2px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text-dim)}
.user-pill img{width:24px;height:24px;border-radius:50%;border:1px solid var(--border)}
.user-pill .signout{cursor:pointer;color:var(--text-muted);font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:14px;transition:.15s}
.user-pill .signout:hover{color:var(--red);background:rgba(239,68,68,.08)}

.signin-btn{cursor:pointer;font-family:var(--font-mono);font-size:11px;padding:5px 12px;background:var(--gold);color:var(--black);border:none;border-radius:4px;font-weight:600;letter-spacing:.5px}
.signin-btn:hover{background:var(--gold-light)}

/* ── SIDEBAR ────────────────────────────────────────────── */
.sidebar{grid-area:sidebar;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.sidebar h2{font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin:0 0 8px 0}

.upload-zone{position:relative;border:2px dashed var(--border);border-radius:6px;padding:24px;text-align:center;cursor:pointer;transition:.15s;background:var(--surface-2)}
.upload-zone:hover{border-color:var(--gold);background:var(--gold-dim)}
.upload-zone.has-image{padding:0;border-style:solid;background:var(--surface-2)}
.upload-zone img{display:block;width:100%;border-radius:4px}
.upload-zone .placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text-muted);font-size:11px}
.upload-zone .placeholder svg{width:32px;height:32px;opacity:.5}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

.field{display:flex;flex-direction:column;gap:4px}
.field label{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between}
.field label .val{color:var(--gold);font-weight:600}
.field input[type=range]{width:100%;accent-color:var(--gold)}
.field input[type=number],.field select{background:var(--surface-2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:6px 8px;font-family:var(--font-mono);font-size:11px}
.field input[type=number]:focus,.field select:focus{border-color:var(--gold);outline:0}

.advanced-toggle{cursor:pointer;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:6px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;letter-spacing:1px;transition:.15s}
.advanced-toggle:hover{color:var(--gold)}
.advanced{display:none;flex-direction:column;gap:14px}
.advanced.open{display:flex}

.gen-btn{margin-top:auto;cursor:pointer;font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1.5px;padding:14px;background:var(--gold);color:var(--black);border:none;border-radius:6px;transition:.15s;text-transform:uppercase}
.gen-btn:hover:not(:disabled){background:var(--gold-light)}
.gen-btn:disabled{background:var(--surface-3);color:var(--text-muted);cursor:not-allowed}
.gen-btn .cost{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.5px;opacity:.7;margin-left:4px}

/* ── MAIN ───────────────────────────────────────────────── */
.main{grid-area:main;background:var(--black);position:relative;display:flex;flex-direction:column;overflow:hidden}
.main-viewport{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:24px}

/* Empty state */
.empty-state{text-align:center;color:var(--text-muted);font-family:var(--font-mono);font-size:12px;letter-spacing:.5px;line-height:1.8}
.empty-state svg{width:64px;height:64px;opacity:.2;margin-bottom:12px}

/* Sprite-sheet preview viewer */
.preview-viewport{width:min(700px,90%);aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;position:relative;overflow:hidden;cursor:grab;user-select:none}
.preview-viewport.dragging{cursor:grabbing}
.preview-viewport canvas{display:block;width:100%;height:100%;image-rendering:auto}
.preview-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:1px;pointer-events:none;opacity:.7}

/* model-viewer (final GLB) */
model-viewer{width:min(700px,90%);aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;--poster-color:transparent;--progress-bar-color:var(--gold)}

/* Action bar below viewer */
.action-bar{padding:12px 24px 24px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.btn{cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:600;padding:10px 18px;border-radius:5px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);transition:.15s;letter-spacing:.5px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-primary{background:var(--gold);color:var(--black);border-color:var(--gold)}
.btn-primary:hover{background:var(--gold-light);border-color:var(--gold-light);color:var(--black)}
.btn-danger{background:transparent;color:var(--red);border-color:rgba(239,68,68,.4)}
.btn-danger:hover{background:rgba(239,68,68,.1);color:var(--red);border-color:var(--red)}
.btn .cost{font-size:9px;opacity:.7;margin-left:2px}

/* Live progress bar */
.progress-strip{padding:12px 24px;background:var(--surface);border-top:1px solid var(--border)}
.progress-strip .row{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.progress-strip .stage{color:var(--gold)}
.progress-strip .bar{height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden}
.progress-strip .bar-fill{height:100%;background:var(--gold);transition:width .3s ease;width:0%}

/* ── QUEUE OVERLAY (top-right) ─────────────────────────── */
.queue-overlay{position:fixed;top:60px;right:14px;width:280px;max-height:calc(100vh - 80px);overflow-y:auto;display:flex;flex-direction:column;gap:8px;z-index:90;pointer-events:none}
.queue-item{pointer-events:auto;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:var(--font-mono);font-size:10px;display:flex;flex-direction:column;gap:6px;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.queue-item .top{display:flex;justify-content:space-between;align-items:center}
.queue-item .id{color:var(--text-muted);font-size:9px}
.queue-item .stage{color:var(--gold);text-transform:uppercase;letter-spacing:.5px;font-size:9px}
.queue-item .bar{height:3px;background:var(--surface-3);border-radius:1px;overflow:hidden}
.queue-item .bar-fill{height:100%;background:var(--gold);transition:width .3s}
.queue-item .actions{display:flex;gap:4px;margin-top:2px}
.queue-item .qbtn{flex:1;cursor:pointer;font-family:var(--font-mono);font-size:9px;padding:4px 6px;border:1px solid var(--border);border-radius:3px;background:var(--surface-2);color:var(--text-dim);transition:.15s}
.queue-item .qbtn:hover{border-color:var(--red);color:var(--red)}
.queue-item .qbtn.approve:hover{border-color:var(--green);color:var(--green)}

/* ── COLD-BOOT OVERLAY ─────────────────────────────────── */
.startup-overlay{position:fixed;inset:0;background:rgba(9,9,11,.92);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center}
.startup-overlay.show{display:flex}
.startup-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:32px 40px;width:min(440px,90vw);text-align:center}
.startup-spinner{width:60px;height:60px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;margin:0 auto 24px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.startup-card h3{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:1.5px;color:var(--gold);margin:0 0 8px;text-transform:uppercase}
.startup-card p{color:var(--text-dim);font-size:12px;margin:0 0 20px}
.startup-bar{height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;margin-bottom:8px}
.startup-bar-fill{height:100%;background:var(--gold);width:0%;transition:width .5s ease}
.startup-meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.startup-stage{color:var(--gold)}

/* ── TOAST ─────────────────────────────────────────────── */
.toast-stack{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:6px;padding:10px 14px;font-family:var(--font-mono);font-size:11px;color:var(--text);min-width:240px;max-width:380px;animation:toastIn .25s}
.toast.error{border-left-color:var(--red)}
.toast.success{border-left-color:var(--green)}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <div class="logo"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 12 L11 15 L16 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h1>MISSINGLINK <span>MODELGEN</span></h1>
    <div class="spacer"></div>
    <a href="/studio.html" class="hdr-link">← Studio</a>
    <div id="tokenBadge" class="token-badge" style="display:none" title="Click to buy more tokens">— tokens</div>
    <div id="connBadge" class="hdr-badge"><span class="dot cold"></span><span>GPU cold</span></div>
    <div id="authIn" class="user-pill" style="display:none">
      <img id="authPic" src="" alt="">
      <span id="authEmail">—</span>
      <span class="signout" onclick="signOut()">×</span>
    </div>
    <button id="authOut" class="signin-btn" onclick="signIn()">Sign in</button>
  </header>

  <aside class="sidebar">
    <h2>Input</h2>
    <label class="upload-zone" id="uploadZone">
      <div class="placeholder" id="uploadPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4M12 4L6 10M12 4L18 10M4 20H20" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Drop image or click to upload</span>
      </div>
      <img id="uploadPreview" style="display:none">
      <input type="file" id="fileInput" accept="image/*">
    </label>

    <h2>Settings</h2>
    <div class="field">
      <label>Sparse Structure Steps <span class="val" id="ssStepsVal">8</span></label>
      <input type="range" id="ssSteps" min="4" max="20" value="8">
    </div>
    <div class="field">
      <label>Shape SLat Steps <span class="val" id="shapeStepsVal">8</span></label>
      <input type="range" id="shapeSteps" min="4" max="20" value="8">
    </div>
    <div class="field">
      <label>Texture SLat Steps <span class="val" id="texStepsVal">6</span></label>
      <input type="range" id="texSteps" min="4" max="16" value="6">
    </div>
    <div class="field">
      <label>Texture Resolution</label>
      <select id="textureSize">
        <option value="1024">1024 × 1024</option>
        <option value="1536" selected>1536 × 1536</option>
        <option value="2048">2048 × 2048</option>
      </select>
    </div>
    <div class="field">
      <label>Vertex Target <span class="val" id="decimateVal">500K</span></label>
      <input type="range" id="decimate" min="100000" max="1000000" step="50000" value="500000">
    </div>

    <div class="advanced-toggle" onclick="toggleAdvanced()">▼ Advanced</div>
    <div class="advanced" id="advanced">
      <div class="field">
        <label>Pipeline Type</label>
        <select id="pipelineType">
          <option value="512" selected>Standard (512)</option>
          <option value="1024_cascade">High-quality (1024 cascade)</option>
        </select>
      </div>
      <div class="field">
        <label>
          <input type="checkbox" id="remesh" style="margin-right:6px">
          Apply Remesh
        </label>
      </div>
    </div>

    <button id="genBtn" class="gen-btn" onclick="submitGen()">
      Generate <span class="cost">200 tokens</span>
    </button>
  </aside>

  <main class="main">
    <div class="main-viewport" id="mainViewport">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2L2 7L12 12L22 7L12 2Z"/><path d="M2 17L12 22L22 17"/><path d="M2 12L12 17L22 12"/></svg>
        <div>UPLOAD AN IMAGE TO BEGIN</div>
        <div style="opacity:.6;font-size:11px;margin-top:4px">Generate a 3D model from a single image</div>
      </div>
    </div>
    <div class="action-bar" id="actionBar" style="display:none"></div>
    <div class="progress-strip" id="progressStrip" style="display:none">
      <div class="row">
        <span class="stage" id="progStage">—</span>
        <span id="progStep">—</span>
      </div>
      <div class="bar"><div class="bar-fill" id="progFill"></div></div>
    </div>
  </main>
</div>

<div class="queue-overlay" id="queueOverlay"></div>

<div class="startup-overlay" id="startupOverlay">
  <div class="startup-card">
    <div class="startup-spinner"></div>
    <h3>Starting GPU</h3>
    <p id="startupMsg">Spinning up the model engine. This takes ~2-3 minutes on cold start.</p>
    <div class="startup-bar"><div class="startup-bar-fill" id="startupFill"></div></div>
    <div class="startup-meta">
      <span class="startup-stage" id="startupStage">CONNECTING…</span>
      <span id="startupTime">0s</span>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
// ────────────────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────────────────
const STATE = {
  user: null,           // {id, email, name, picture, tokens}
  imageFile: null,
  imageDataUrl: null,
  currentJobId: null,   // job currently displayed in main viewport
  spriteImg: null,      // HTMLImageElement for sprite sheet
  spriteMeta: null,     // {grid_w, grid_h, frame_w, frame_h, n_frames, ...}
  spriteFrame: 0,
  isDragging: false,
  dragStartX: 0,
  dragStartFrame: 0,
  gpuState: { stage: 'cold', startup_age_s: 0 },
  startupShowAt: 0,
};
const COSTS = { gen: 200, finalize: 100 };

// Stage label map (for live progress + queue items)
const STAGE_LABELS = {
  queued: 'Queued',
  running_preview: 'Running',
  sampling_ss: 'Sampling structure',
  sampling_shape: 'Sampling shape',
  sampling_tex: 'Sampling texture',
  decoding: 'Decoding',
  rendering: 'Rendering preview',
  pickling: 'Saving state',
  preview_ready: 'Preview ready',
  finalize_queued: 'Finalize queued',
  running_finalize: 'Finalizing',
  finalize_fill_holes: 'Filling holes',
  finalize_prepare_mesh: 'Preparing mesh',
  finalize_uv_unwrap: 'UV unwrapping',
  finalize_bake_export: 'Baking textures',
  finalize_uploading: 'Uploading',
  done: 'Complete',
  failed: 'Failed',
  discarded: 'Discarded',
};

// ────────────────────────────────────────────────────────────
// Toasts
// ────────────────────────────────────────────────────────────
function toast(msg, type='info', dur=3500){
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  t.textContent = msg;
  document.getElementById('toastStack').appendChild(t);
  setTimeout(() => t.remove(), dur);
}

// ────────────────────────────────────────────────────────────
// Auth + tokens
// ────────────────────────────────────────────────────────────
async function loadMe(){
  try {
    const r = await fetch('/api/trellis/me', { credentials: 'include' });
    if (r.status === 401) { renderAuth(null); return; }
    const data = await r.json();
    if (data.ok) {
      STATE.user = data.user;
      renderAuth(data.user);
    }
  } catch(e) { console.error('loadMe', e); }
}
function renderAuth(u){
  const inEl = document.getElementById('authIn');
  const outEl = document.getElementById('authOut');
  const tokEl = document.getElementById('tokenBadge');
  if (u) {
    document.getElementById('authPic').src = u.picture || '';
    document.getElementById('authPic').style.display = u.picture ? '' : 'none';
    document.getElementById('authEmail').textContent = u.email || u.name || 'user';
    inEl.style.display = 'flex';
    outEl.style.display = 'none';
    tokEl.style.display = '';
    tokEl.textContent = `${u.tokens.toLocaleString()} tokens`;
  } else {
    inEl.style.display = 'none';
    outEl.style.display = '';
    tokEl.style.display = 'none';
  }
}
function signIn(){ window.location.href = '/auth/google?return=' + encodeURIComponent(location.pathname); }
function signOut(){
  fetch('/auth/logout', { credentials:'include', method:'POST' }).finally(() => {
    STATE.user = null; renderAuth(null); toast('Signed out');
  });
}

// ────────────────────────────────────────────────────────────
// File upload
// ────────────────────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (f) loadImage(f);
});
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.style.borderColor = 'var(--gold)'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = ''; });
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.style.borderColor = '';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(f);
});
function loadImage(file){
  STATE.imageFile = file;
  const reader = new FileReader();
  reader.onload = () => {
    STATE.imageDataUrl = reader.result;
    document.getElementById('uploadPreview').src = reader.result;
    document.getElementById('uploadPreview').style.display = '';
    document.getElementById('uploadPlaceholder').style.display = 'none';
    uploadZone.classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

// ────────────────────────────────────────────────────────────
// Sliders + advanced
// ────────────────────────────────────────────────────────────
['ssSteps','shapeSteps','texSteps'].forEach(id => {
  const el = document.getElementById(id);
  const valEl = document.getElementById(id + 'Val');
  el.addEventListener('input', () => valEl.textContent = el.value);
});
document.getElementById('decimate').addEventListener('input', (e) => {
  const v = parseInt(e.target.value, 10);
  document.getElementById('decimateVal').textContent = v >= 1000000 ? (v/1000000).toFixed(1)+'M' : (v/1000)+'K';
});
function toggleAdvanced(){ document.getElementById('advanced').classList.toggle('open'); }

// ────────────────────────────────────────────────────────────
// Submit gen
// ────────────────────────────────────────────────────────────
async function submitGen(){
  if (!STATE.user) { toast('Sign in to generate', 'error'); return; }
  if (!STATE.imageFile) { toast('Upload an image first', 'error'); return; }
  if (STATE.user.tokens < COSTS.gen) { toast(`Insufficient tokens (need ${COSTS.gen})`, 'error'); return; }

  const params = {
    ss_steps: +document.getElementById('ssSteps').value,
    shape_steps: +document.getElementById('shapeSteps').value,
    tex_steps: +document.getElementById('texSteps').value,
    texture_size: +document.getElementById('textureSize').value,
    decimate_target: +document.getElementById('decimate').value,
    remesh: document.getElementById('remesh').checked,
    pipeline_type: document.getElementById('pipelineType').value,
  };

  document.getElementById('genBtn').disabled = true;
  document.getElementById('genBtn').textContent = 'Submitting...';

  try {
    const imageB64 = STATE.imageDataUrl.split(',')[1];
    const r = await fetch('/api/trellis/generate', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_b64: imageB64, params }),
    });
    const data = await r.json();
    if (!data.ok) {
      toast(data.error || 'Submit failed', 'error');
      return;
    }
    toast('Job submitted', 'success');
    STATE.user.tokens -= COSTS.gen;
    renderAuth(STATE.user);
    STATE.currentJobId = data.job_id;
    showProgress(data.job_id);
  } catch(e) {
    toast('Network error: ' + e.message, 'error');
  } finally {
    document.getElementById('genBtn').disabled = false;
    document.getElementById('genBtn').innerHTML = `Generate <span class="cost">${COSTS.gen} tokens</span>`;
  }
}

// ────────────────────────────────────────────────────────────
// Sprite-sheet preview viewer
// ────────────────────────────────────────────────────────────
function showSpritePreview(meta, url){
  const vp = document.getElementById('mainViewport');
  vp.innerHTML = `
    <div class="preview-viewport" id="previewViewport">
      <canvas id="previewCanvas"></canvas>
      <div class="preview-hint">DRAG TO ROTATE</div>
    </div>
  `;
  STATE.spriteMeta = meta;
  STATE.spriteFrame = 0;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    STATE.spriteImg = img;
    drawSpriteFrame();
    bindSpriteDrag();
  };
  img.src = url;
}
function drawSpriteFrame(){
  if (!STATE.spriteImg || !STATE.spriteMeta) return;
  const canvas = document.getElementById('previewCanvas');
  if (!canvas) return;
  const m = STATE.spriteMeta;
  const w = m.frame_w, h = m.frame_h;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const f = ((STATE.spriteFrame % m.n_frames) + m.n_frames) % m.n_frames;
  const col = f % m.grid_w;
  const row = Math.floor(f / m.grid_w);
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(STATE.spriteImg, col*w, row*h, w, h, 0, 0, w, h);
}
function bindSpriteDrag(){
  const vp = document.getElementById('previewViewport');
  if (!vp) return;
  const onDown = (e) => {
    STATE.isDragging = true;
    vp.classList.add('dragging');
    STATE.dragStartX = (e.touches ? e.touches[0].clientX : e.clientX);
    STATE.dragStartFrame = STATE.spriteFrame;
  };
  const onMove = (e) => {
    if (!STATE.isDragging) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const dx = x - STATE.dragStartX;
    const m = STATE.spriteMeta;
    const framesPerWidth = m.n_frames / 1.2;  // 1.2 viewport widths = full rotation
    const w = vp.clientWidth || 700;
    const delta = (dx / w) * framesPerWidth;
    STATE.spriteFrame = Math.round(STATE.dragStartFrame - delta);
    drawSpriteFrame();
  };
  const onUp = () => { STATE.isDragging = false; vp.classList.remove('dragging'); };
  vp.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  vp.addEventListener('touchstart', onDown);
  window.addEventListener('touchmove', onMove);
  window.addEventListener('touchend', onUp);
}

// ────────────────────────────────────────────────────────────
// Final GLB viewer
// ────────────────────────────────────────────────────────────
function showGlbViewer(glbUrl){
  const vp = document.getElementById('mainViewport');
  vp.innerHTML = `
    <model-viewer
      src="${glbUrl}"
      camera-controls
      auto-rotate
      auto-rotate-delay="2000"
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      camera-orbit="0deg 75deg auto"
      style="width:min(700px,90%);aspect-ratio:1">
    </model-viewer>
  `;
}

// ────────────────────────────────────────────────────────────
// Action bar (Approve / Discard / Download)
// ────────────────────────────────────────────────────────────
function setActionBar(html){
  const bar = document.getElementById('actionBar');
  if (!html) { bar.style.display = 'none'; bar.innerHTML = ''; return; }
  bar.innerHTML = html;
  bar.style.display = '';
}

// ────────────────────────────────────────────────────────────
// Progress strip
// ────────────────────────────────────────────────────────────
function setProgress(visible, stage, step, total){
  const strip = document.getElementById('progressStrip');
  if (!visible) { strip.style.display = 'none'; return; }
  strip.style.display = '';
  document.getElementById('progStage').textContent = STAGE_LABELS[stage] || stage || '—';
  if (total > 0) {
    document.getElementById('progStep').textContent = `${step} / ${total}`;
    document.getElementById('progFill').style.width = (100 * step / total) + '%';
  } else {
    document.getElementById('progStep').textContent = '';
    document.getElementById('progFill').style.width = '0%';
  }
}

// ────────────────────────────────────────────────────────────
// Job polling
// ────────────────────────────────────────────────────────────
async function showProgress(jobId){
  STATE.currentJobId = jobId;
  document.getElementById('emptyState')?.remove();
  setProgress(true, 'queued', 0, 0);
  pollJob(jobId);
}
async function pollJob(jobId){
  if (STATE.currentJobId !== jobId) return;
  try {
    const r = await fetch('/api/trellis/job/' + jobId, { credentials: 'include' });
    const data = await r.json();
    if (!data.ok) { toast(data.error || 'Job poll failed', 'error'); return; }
    handleJobUpdate(data);
    if (['done','failed','discarded'].includes(data.status)) return;
  } catch(e) { console.error('pollJob', e); }
  setTimeout(() => pollJob(jobId), 1500);
}
function handleJobUpdate(j){
  setProgress(true, j.stage, j.step || 0, j.total_steps || 0);

  if (j.status === 'preview_ready' && j.sprite_meta && j.preview_url) {
    showSpritePreview(j.sprite_meta, j.preview_url);
    setActionBar(`
      <button class="btn btn-primary" onclick="approveJob('${j.job_id}')">
        Approve & Finalize <span class="cost">+${COSTS.finalize} tokens</span>
      </button>
      <button class="btn btn-danger" onclick="discardJob('${j.job_id}')">Discard</button>
    `);
    setProgress(false);
  } else if (j.status === 'done' && j.glb_url) {
    showGlbViewer(j.glb_url);
    setActionBar(`
      <a class="btn btn-primary" href="${j.glb_url}" download="model_${j.job_id}.glb">⬇ Download GLB</a>
      <button class="btn" onclick="newGen()">+ New generation</button>
    `);
    setProgress(false);
    refreshTokens();
  } else if (j.status === 'failed') {
    toast('Generation failed: ' + (j.error || 'unknown error'), 'error', 6000);
    setProgress(false);
    setActionBar(`<button class="btn" onclick="newGen()">+ New generation</button>`);
    refreshTokens();
  } else if (j.status === 'discarded') {
    setProgress(false);
    setActionBar(`<button class="btn" onclick="newGen()">+ New generation</button>`);
  }
}
async function refreshTokens(){
  try {
    const r = await fetch('/api/trellis/me', { credentials: 'include' });
    const d = await r.json();
    if (d.ok) { STATE.user = d.user; renderAuth(d.user); }
  } catch(e) {}
}
async function approveJob(jobId){
  if (!STATE.user || STATE.user.tokens < COSTS.finalize) {
    toast(`Insufficient tokens (need ${COSTS.finalize})`, 'error'); return;
  }
  setActionBar(`<button class="btn" disabled>Finalizing...</button>`);
  try {
    const r = await fetch(`/api/trellis/job/${jobId}/finalize`, { method: 'POST', credentials: 'include' });
    const d = await r.json();
    if (!d.ok) { toast(d.error || 'Finalize failed', 'error'); return; }
    STATE.user.tokens -= COSTS.finalize;
    renderAuth(STATE.user);
    pollJob(jobId);
  } catch(e) { toast('Network error', 'error'); }
}
async function discardJob(jobId){
  setActionBar(`<button class="btn" disabled>Discarding...</button>`);
  try {
    const r = await fetch(`/api/trellis/job/${jobId}/discard`, { method: 'POST', credentials: 'include' });
    const d = await r.json();
    if (!d.ok) { toast(d.error || 'Discard failed', 'error'); return; }
    if (STATE.currentJobId === jobId) {
      newGen();
    }
  } catch(e) { toast('Network error', 'error'); }
}
function newGen(){
  STATE.currentJobId = null;
  setActionBar(null);
  setProgress(false);
  document.getElementById('mainViewport').innerHTML = `
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2L2 7L12 12L22 7L12 2Z"/><path d="M2 17L12 22L22 17"/><path d="M2 12L12 17L22 12"/></svg>
      <div>UPLOAD AN IMAGE TO BEGIN</div>
    </div>
  `;
}

// ────────────────────────────────────────────────────────────
// Queue overlay (top-right) — polls /api/trellis/jobs
// ────────────────────────────────────────────────────────────
async function pollQueue(){
  if (!STATE.user) { document.getElementById('queueOverlay').innerHTML = ''; return; }
  try {
    const r = await fetch('/api/trellis/jobs', { credentials: 'include' });
    const d = await r.json();
    if (d.ok) renderQueue(d.jobs || []);
  } catch(e) {}
}
function renderQueue(jobs){
  const el = document.getElementById('queueOverlay');
  el.innerHTML = jobs.map(j => {
    const pct = (j.total_steps > 0) ? Math.min(100, 100 * (j.step || 0) / j.total_steps) : 0;
    const isPreviewReady = j.status === 'preview_ready';
    const stageLabel = STAGE_LABELS[j.stage] || j.stage || j.status;
    const showThis = STATE.currentJobId === j.id ? '' :
      `<button class="qbtn" onclick="loadExistingJob('${j.id}')">View</button>`;
    return `
      <div class="queue-item">
        <div class="top">
          <span class="stage">${stageLabel}</span>
          <span class="id">${j.id.slice(0, 8)}</span>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="actions">
          ${showThis}
          ${isPreviewReady ? `<button class="qbtn approve" onclick="approveJob('${j.id}')">Approve</button>` : ''}
          <button class="qbtn" onclick="discardJob('${j.id}')">×</button>
        </div>
      </div>
    `;
  }).join('');
}
async function loadExistingJob(jobId){
  STATE.currentJobId = jobId;
  document.getElementById('emptyState')?.remove();
  pollJob(jobId);
}

// ────────────────────────────────────────────────────────────
// GPU cold-boot overlay + status badge
// ────────────────────────────────────────────────────────────
async function pollGpuStatus(){
  try {
    const r = await fetch('/api/trellis/status');
    const d = await r.json();
    if (d.ok) {
      STATE.gpuState = d;
      updateBadge(d);
      updateStartupOverlay(d);
    }
  } catch(e) {}
}
function updateBadge(s){
  const badge = document.getElementById('connBadge');
  const dot = badge.querySelector('.dot');
  const text = badge.querySelector('span:last-child');
  dot.className = 'dot';
  if (s.stage === 'ready') {
    dot.classList.add('ready');
    text.textContent = 'GPU ready';
  } else if (['booting','loading_transformer','building_pipeline','registering','compiling','warming_up'].includes(s.stage)) {
    dot.classList.add('warming');
    if (s.stage === 'registering' && s.total > 0) text.textContent = `Compiling ${s.progress}/${s.total}`;
    else text.textContent = (STAGE_LABELS[s.stage] || 'Warming');
  } else {
    dot.classList.add('cold');
    text.textContent = 'GPU cold';
  }
}
function updateStartupOverlay(s){
  const overlay = document.getElementById('startupOverlay');
  const isWarming = ['booting','loading_transformer','building_pipeline','registering','compiling','warming_up'].includes(s.stage);
  if (isWarming) {
    if (!STATE.startupShowAt) STATE.startupShowAt = Date.now();
    overlay.classList.add('show');
    const elapsed = (Date.now() - STATE.startupShowAt) / 1000 + (s.startup_age_s || 0);
    const expectedTotal = 180; // seconds
    const pct = Math.min(95, 100 * elapsed / expectedTotal);
    document.getElementById('startupFill').style.width = pct + '%';
    document.getElementById('startupStage').textContent = (STAGE_LABELS[s.stage] || s.stage).toUpperCase();
    document.getElementById('startupTime').textContent = Math.round(elapsed) + 's';
    if (s.stage === 'registering' && s.total > 0) {
      document.getElementById('startupMsg').textContent = `Compiling kernels (${s.progress}/${s.total})...`;
    }
  } else {
    overlay.classList.remove('show');
    STATE.startupShowAt = 0;
  }
}

// ────────────────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────────────────
loadMe();
pollGpuStatus();
pollQueue();
setInterval(pollGpuStatus, 2000);
setInterval(pollQueue, 3000);

</script>
