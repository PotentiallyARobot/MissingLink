<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1a0a2e 0%, #0a0815 60%, #050309 100%);
    color: white;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  .leaflet-container { background: #0a0815 !important; font-family: inherit; }
  .leaflet-control-attribution {
    background: rgba(0,0,0,0.4) !important;
    color: #64748b !important;
    font-size: 9px !important;
    padding: 2px 6px !important;
  }
  .leaflet-control-attribution a { color: #94a3b8 !important; }
  .wing-pin-wrap { background: transparent !important; border: 0 !important; }

  .live-ping { animation: ping 2s cubic-bezier(0,0,0.2,1) infinite; }
  @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }

  .pred-pulse { animation: predPulse 3s ease-in-out infinite; }
  @keyframes predPulse {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }

  .filter-active-bumble { background: linear-gradient(135deg, rgba(250,204,21,0.22), rgba(245,158,11,0.12)); border-color: rgba(250,204,21,0.6); color: #facc15; }
  .filter-active-hinge  { background: linear-gradient(135deg, rgba(167,139,250,0.25), rgba(139,92,246,0.12)); border-color: rgba(167,139,250,0.6); color: #c4b5fd; }

  .img-wrap { position: relative; }
  .img-wrap img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .img-wrap.errored img { display: none; }
  .img-wrap .img-fallback { display: none; position: absolute; inset: 0; }
  .img-wrap.errored .img-fallback { display: block; }

  /* PREDICTION MODE */
  body.prediction-mode .stat-card,
  body.prediction-mode .pred-card {
    border-style: dashed !important;
    border-color: rgba(167,139,250,0.35) !important;
    background: rgba(167,139,250,0.04) !important;

  body.prediction-mode #map-section::after {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(45deg,
        rgba(167,139,250,0.08) 0,
        rgba(167,139,250,0.08) 8px,
        transparent 8px,
        transparent 18px),
      rgba(10,8,21,0.5);
    pointer-events: none;
    z-index: 400;
  }
  body.prediction-mode #map-section::before {
    content: 'PREDICTION · TONIGHT';
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    background: rgba(15,10,30,0.92);
    border: 1px dashed rgba(167,139,250,0.5);
    color: #c4b5fd;

    letter-spacing: 1.5px;
    padding: 5px 12px;
    border-radius: 999px;
    z-index: 500;
    pointer-events: none;

  }
  body.prediction-mode .live-only { display: none !important; }
  body:not(.prediction-mode) .pred-only { display: none !important; }
</style>

<script>
/* ==========================================================
   DATA
   ========================================================== */
const VENUES = [
  { id:'le-diplomate', name:'Le Diplomate', address:'1601 14th St NW', neighborhood:'Logan Circle', lat:38.9132, lng:-77.0319, pop:1.00, type:'french',  img:'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=600&q=80', palette:['#7a1f1f','#3a0d0d'] },
  { id:'service-bar',  name:'Service Bar DC', address:'926 U St NW', neighborhood:'U Street', lat:38.9173, lng:-77.0252, pop:0.86, type:'cocktail', img:'https://images.unsplash.com/photo-1572116469696-31de0f17cc34?w=600&q=80', palette:['#5a3210','#1f1108'] },
  { id:'barcelona',    name:'Barcelona Wine Bar', address:'1622 14th St NW', neighborhood:'Logan Circle', lat:38.9136, lng:-77.0319, pop:0.78, type:'wine', img:'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=600&q=80', palette:['#3a1818','#0f0606'] },
  { id:'jack-rose',    name:'Jack Rose Dining Saloon', address:'2007 18th St NW', neighborhood:'Adams Morgan', lat:38.9189, lng:-77.0420, pop:0.70, type:'whiskey', img:'https://images.unsplash.com/photo-1538488881038-e252a119ace7?w=600&q=80', palette:['#4a2c10','#1a0e05'] },
  { id:'brixton',      name:'The Brixton', address:'901 U St NW', neighborhood:'U Street', lat:38.9173, lng:-77.0249, pop:0.65, type:'rooftop', img:'https://images.unsplash.com/photo-1525268323446-0505b6fe7778?w=600&q=80', palette:['#3a2410','#120c06'] },
  { id:'green-zone',   name:'The Green Zone', address:'2226 18th St NW', neighborhood:'Adams Morgan', lat:38.9205, lng:-77.0418, pop:0.60, type:'cocktail', img:'https://images.unsplash.com/photo-1543007630-9710e4a00a20?w=600&q=80', palette:['#0d3a2a','#04140e'] },
  { id:'dirty-habit',  name:'Dirty Habit', address:'555 8th St NW', neighborhood:'Penn Quarter', lat:38.8961, lng:-77.0228, pop:0.72, type:'cocktail', img:'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=600&q=80', palette:['#2a1042','#0e0418'] },
  { id:'copycat',      name:'Copycat Co.', address:'1110 H St NE', neighborhood:'H Street', lat:38.9001, lng:-76.9924, pop:0.62, type:'cocktail', img:'https://images.unsplash.com/photo-1485872299712-c87fe79ae6a1?w=600&q=80', palette:['#3a1c08','#160a02'] },
  { id:'residents',    name:'Residents Cafe & Bar', address:'1755 New Hampshire Ave NW', neighborhood:'Dupont', lat:38.9119, lng:-77.0410, pop:0.55, type:'cafe', img:'https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=600&q=80', palette:['#3a280c','#150e04'] },
  { id:'el-techo',     name:'El Techo', address:'606 Florida Ave NW', neighborhood:'Shaw', lat:38.9152, lng:-77.0190, pop:0.58, type:'rooftop', img:'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=600&q=80', palette:['#3a0c2c','#150410'] },
];

const state = {
  tab: 'map',
  app: 'tinder',
  selectedId: 'le-diplomate',
  now: new Date(),
};
let liveValues = {};
let lastIsLive = null;
let lastListRefresh = 0;

/* ==========================================================
   TIME-OF-DAY MODEL
   ========================================================== */
function getActivityLevel(date) {
  const h = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;
  if (h < 1)  return 0.96;
  if (h < 2)  return 0.78;
  if (h < 3)  return 0.50;
  if (h < 4)  return 0.22;
  if (h < 11) return 0.04;
  if (h < 16) return 0.06;
  if (h < 17) return 0.10;
  if (h < 18) return 0.16;
  if (h < 19) return 0.28;
  if (h < 20) return 0.45;
  if (h < 21) return 0.62;
  if (h < 22) return 0.80;
  if (h < 23) return 0.93;
  return 1.00;
}

function getPeakDate(now) {
  const peak = new Date(now);
  peak.setMinutes(0); peak.setSeconds(0); peak.setMilliseconds(0);
  if (now.getHours() < 4) peak.setDate(peak.getDate() - 1);
  peak.setHours(23);
  return peak;
}

function getTimeContext(date) {
  const h = date.getHours();
  if (h >= 4 && h < 11) return { mode:'morning',    phase:'Quiet morning',  headline:'Most spots are closed',     detail:'Doors start opening around 5 PM',           isLive:false };
  if (h >= 11 && h < 16) return { mode:'afternoon', phase:'Daytime',        headline:"Tonight's preview",          detail:'Crowds build after 8 PM · peak around 11 PM', isLive:false };
  if (h >= 16 && h < 18) return { mode:'preopen',   phase:'Doors opening',  headline:'First arrivals trickling in', detail:'Real ramp-up around 8 PM',                  isLive:true };
  if (h >= 18 && h < 21) return { mode:'building',  phase:'Building up',    headline:'Crowd is forming',           detail:'Picks up fast in the next hour or two',     isLive:true };
  if (h >= 21 && h < 23) return { mode:'heating',   phase:'Heating up',     headline:"It's on",                    detail:'Peak window is 11 PM–1 AM',                 isLive:true };
  if (h === 23 || (h >= 0 && h < 1)) return { mode:'peak', phase:'Peak hours', headline:'Right now is the move', detail:'Maximum activity across DC',                isLive:true };
  if (h >= 1 && h < 3) return { mode:'late-peak',   phase:'Late peak',      headline:'Still going',                detail:'Last call coming up — head out now',        isLive:true };
  return                       { mode:'closing',     phase:'Last call',      headline:'Winding down',               detail:'Most spots closing in the next hour',       isLive:true };
}

function getDisplayTime(date) {
  return getTimeContext(date).isLive ? date : getPeakDate(date);
}

function getBestArrival(date, venue) {
  const h = date.getHours() + date.getMinutes() / 60;
  const offset = (venue.type === 'french' || venue.type === 'wine') ? -0.75 : (venue.type === 'whiskey' ? 0.25 : 0);
  let target = 22.25 + offset;
  if (h >= 23 || h < 4) target = 23.5 + offset;
  const diff = target - (h < 4 ? h + 24 : h);
  if (Math.abs(diff) < 0.25) return 'Right now';
  if (diff < 0 && diff > -2) return 'Now (peak)';
  if (diff < -2) return "You're past peak";
  const tH = Math.floor(target) % 24;
  const tM = Math.round((target % 1) * 60);
  const ampm = tH >= 12 ? 'PM' : 'AM';
  const h12 = ((tH + 11) % 12) + 1;
  return `${h12}:${String(tM).padStart(2, '0')} ${ampm}`;
}

function timeUntilPeak(date) {
  const h = date.getHours() + date.getMinutes() / 60;
  if (h < 4) return null;
  const diff = 23 - h;
  if (diff <= 0) return null;
  const hrs = Math.floor(diff);
  const mins = Math.round((diff - hrs) * 60);
  return hrs === 0 ? `${mins}m` : `${hrs}h ${mins}m`;
}

function seededRand(id, bucketMs = 60000) {
  const bucket = Math.floor(Date.now() / bucketMs);
  let s = bucket;
  for (const c of id) s = (s * 31 + c.charCodeAt(0)) >>> 0;
  return () => {
    s = (s * 1664525 + 1013904223) >>> 0;
    return (s & 0xffffffff) / 0x100000000;
  };
}

function getTargetStats(venue, date) {
  const dispDate = getDisplayTime(date);
  const activity = getActivityLevel(dispDate);
  const rand = seededRand(venue.id);
  const crowd = Math.max(2, Math.round(260 * venue.pop * activity + (rand() - 0.5) * 14));
  const capacity = 220 * venue.pop;
  const fill = Math.min(1, crowd / capacity);
  const openSeats = Math.max(0, Math.round((1 - fill) * 18 + rand() * 2));
  let girlsRatio = 0.46;
  if (venue.type === 'wine')    girlsRatio = 0.54;
  if (venue.type === 'french')  girlsRatio = 0.55;
  if (venue.type === 'whiskey') girlsRatio = 0.38;
  if (venue.type === 'rooftop') girlsRatio = 0.50;
  if (venue.type === 'cafe')    girlsRatio = 0.52;
  girlsRatio += (rand() - 0.5) * 0.04;
  girlsRatio = Math.max(0.30, Math.min(0.70, girlsRatio));
  const girlsPct = Math.round(girlsRatio * 100);
  const guysPct = 100 - girlsPct;
  const groupsHigh = activity > 0.78;
  const groupsMid  = activity > 0.45;
  const girlsInGroups = girlsRatio > 0.48 && groupsHigh ? 'High' : groupsMid ? 'Medium' : 'Low';
  const guysInGroups  = !groupsHigh && groupsMid ? 'Medium' : groupsHigh ? 'High' : 'Low';
  const soloWomen     = girlsRatio > 0.5 && activity > 0.6 ? 'Medium' : activity > 0.4 ? 'Low' : 'Sparse';
  const soloMen       = activity > 0.6 ? 'Medium' : activity > 0.3 ? 'Low' : 'Sparse';
  const couples       = (venue.type === 'french' || venue.type === 'wine') && activity > 0.4 ? 'Medium'
                      : activity > 0.55 ? 'Low' : 'Sparse';
  const socialVibe    = activity > 0.78 ? 'Easy to mingle'
                      : activity > 0.5  ? 'Warming up'
                      : activity > 0.2  ? 'Mellow' : 'Quiet';
  const tinderTotal = Math.max(0, Math.round(crowd * (0.115 + (rand() - 0.5) * 0.015)));
  const tinderRatio = 0.56 + (rand() - 0.5) * 0.04;
  const tinderGuys  = Math.round(tinderTotal * tinderRatio);
  const tinderGirls = Math.max(0, tinderTotal - tinderGuys);
  const bumbleTotal = Math.max(0, Math.round(crowd * (0.085 + (rand() - 0.5) * 0.015)));
  const bumbleRatio = 0.56 + (rand() - 0.5) * 0.04;
  const bumbleGirls = Math.round(bumbleTotal * bumbleRatio);
  const bumbleGuys  = Math.max(0, bumbleTotal - bumbleGirls);
  const hingeTotal  = Math.max(0, Math.round(crowd * (0.105 + (rand() - 0.5) * 0.015)));
  const hingeRatio  = 0.515 + (rand() - 0.5) * 0.03;
  const hingeGirls  = Math.round(hingeTotal * hingeRatio);
  const hingeGuys   = Math.max(0, hingeTotal - hingeGirls);

  return {
    crowd, openSeats, guysPct, girlsPct,
    girlsInGroups, guysInGroups, soloWomen, soloMen, couples, socialVibe,
    tinder: { total: tinderTotal, guys: tinderGuys, girls: tinderGirls },
    bumble: { total: bumbleTotal, guys: bumbleGuys, girls: bumbleGirls },
    hinge:  { total: hingeTotal,  guys: hingeGuys,  girls: hingeGirls },
    activity,
  };
}

function walk(current, target, drift = 0.18, jitter = 1.0) {
  const cur = current ?? target;
  const step = (target - cur) * drift + (Math.random() - 0.5) * jitter;
  return Math.max(0, Math.round(cur + step));
}

function tickSimulation() {
  state.now = new Date();
  const ctx = getTimeContext(state.now);
  for (const v of VENUES) {
    const t = getTargetStats(v, state.now);
    const cur = liveValues[v.id];
    if (!ctx.isLive || !cur) { liveValues[v.id] = t; continue; }
    const crowd = walk(cur.crowd, t.crowd, 0.12, 1.2);
    const tinderTotal = walk(cur.tinder.total, t.tinder.total, 0.18, 0.55);
    const bumbleTotal = walk(cur.bumble.total, t.bumble.total, 0.18, 0.45);
    const hingeTotal  = walk(cur.hinge.total,  t.hinge.total,  0.18, 0.45);
    const tinderRatio = t.tinder.total > 0 ? t.tinder.guys / t.tinder.total : 0.56;
    const bumbleRatio = t.bumble.total > 0 ? t.bumble.girls / t.bumble.total : 0.56;
    const hingeRatio  = t.hinge.total  > 0 ? t.hinge.girls  / t.hinge.total  : 0.515;
    const tinderGuys = Math.round(tinderTotal * tinderRatio);
    const bumbleGirls = Math.round(bumbleTotal * bumbleRatio);
    const hingeGirls  = Math.round(hingeTotal  * hingeRatio);
    liveValues[v.id] = {
      crowd, openSeats: walk(cur.openSeats, t.openSeats, 0.25, 0.4),
      guysPct: t.guysPct, girlsPct: t.girlsPct,
      girlsInGroups: t.girlsInGroups, guysInGroups: t.guysInGroups,
      soloWomen: t.soloWomen, soloMen: t.soloMen, couples: t.couples, socialVibe: t.socialVibe,
      tinder: { total: tinderTotal, guys: tinderGuys, girls: tinderTotal - tinderGuys },
      bumble: { total: bumbleTotal, guys: bumbleTotal - bumbleGirls, girls: bumbleGirls },
      hinge:  { total: hingeTotal,  guys: hingeTotal  - hingeGirls,  girls: hingeGirls },
      activity: t.activity,
    };
  }
}

/* ==========================================================
   APP FILTER + RATIO HELPERS
   ========================================================== */
const APPS = {
  all:    { label: 'All apps', short: 'All',    color: '#ffffff' },
  tinder: { label: 'Tinder',   short: 'Tinder', color: '#fb7185' },
  bumble: { label: 'Bumble',   short: 'Bumble', color: '#facc15' },
  hinge:  { label: 'Hinge',    short: 'Hinge',  color: '#a78bfa' },
};

function getAppCount(stats, app = state.app) {
  if (app === 'all') return stats.tinder.total + stats.bumble.total + stats.hinge.total;
  return stats[app].total;
}
function getAppRatio(stats, app = state.app) {
  if (app === 'all') {
    const guys  = stats.tinder.guys  + stats.bumble.guys  + stats.hinge.guys;
    const girls = stats.tinder.girls + stats.bumble.girls + stats.hinge.girls;
    return { guys, girls, total: guys + girls };
  }
  return { guys: stats[app].guys, girls: stats[app].girls, total: stats[app].total };
}
function totalForCurrentApp() {
  return Object.values(liveValues).reduce((s, v) => s + getAppCount(v), 0);
}
function totalGenderForCurrentApp() {
  return Object.values(liveValues).reduce((acc, v) => {
    const r = getAppRatio(v);
    acc.guys += r.guys; acc.girls += r.girls; return acc;
  }, { guys: 0, girls: 0 });
}
function totalCrowd() { return Object.values(liveValues).reduce((s, v) => s + v.crowd, 0); }

function hexToRgba(hex, a) {
  if (hex === '#ffffff') return `rgba(255,255,255,${a})`;
  const m = hex.match(/^#([0-9a-f]{6})$/i);
  if (!m) return hex;
  const n = parseInt(m[1], 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

/* ==========================================================
   GENDER DONUT — circle-bar style for guys vs girls
   ========================================================== */
function genderDonut(stats, app = state.app, size = 28) {
  const r = getAppRatio(stats, app);
  const total = (r.guys + r.girls) || 1;
  const guysPct = (r.guys / total) * 100;
  const strokeW = Math.max(2.5, size * 0.18);
  const radius = (size / 2) - strokeW / 2 - 0.5;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * radius;
  const guysLen = (guysPct / 100) * circ;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;display:block;">
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="url(#gd-girls)" stroke-width="${strokeW}"/>
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="url(#gd-guys)" stroke-width="${strokeW}"
              stroke-dasharray="${guysLen} ${circ - guysLen}"
              stroke-dashoffset="${circ / 4}"
              transform="rotate(-90 ${cx} ${cy})"/>
    </svg>`;
}

// Donut + flanking colored numbers, used everywhere a gender breakdown is shown
function genderCluster(stats, app, opts = {}) {
  const { size = 26, prefix = '', textSize = 11, gap = 6 } = opts;
  const r = getAppRatio(stats, app);
  return `
    <div class="flex items-center" style="gap:${gap}px;">
      <span class="tabular" style="color:#60a5fa;font-weight:700;font-size:${textSize}px;line-height:1;">${prefix}${r.guys}</span>

// Solid-color donut for Leaflet pin (where url() refs to body-level defs work but using solid is safer)
function genderDonutSolid(guys, girls, size = 18) {
  const total = (guys + girls) || 1;
  const guysPct = (guys / total) * 100;
  const strokeW = Math.max(2.5, size * 0.22);
  const radius = (size / 2) - strokeW / 2 - 0.5;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * radius;
  const guysLen = (guysPct / 100) * circ;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;">
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#f43f5e" stroke-width="${strokeW}"/>
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#3b82f6" stroke-width="${strokeW}"
              stroke-dasharray="${guysLen} ${circ - guysLen}"
              stroke-dashoffset="${circ / 4}"
              transform="rotate(-90 ${cx} ${cy})"/>
    </svg>`;
}

/* ==========================================================
   Tonight's Timeline curve
   ========================================================== */
function tonightTimelineSvg(date) {
  const w = 320, h = 56;
  const startH = 17, endH = 27, steps = 50;
  let pts = [];
  for (let i = 0; i <= steps; i++) {
    const hour = startH + (i / steps) * (endH - startH);
    const sample = new Date(date);
    const realHour = hour >= 24 ? hour - 24 : hour;
    sample.setHours(Math.floor(realHour));
    sample.setMinutes(Math.round((realHour % 1) * 60));
    sample.setSeconds(0);
    const a = getActivityLevel(sample);
    const x = (i / steps) * w;
    const y = (h - 4) - a * (h - 8);
    pts.push([x, y]);
  }
  const pathD = pts.map((p, i) => (i === 0 ? `M ${p[0]} ${p[1]}` : `L ${p[0]} ${p[1]}`)).join(' ');
  const fillD = `${pathD} L ${w} ${h} L 0 ${h} Z`;
  const cur = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;
  const adj = cur < 4 ? cur + 24 : cur;
  const inRange = adj >= startH && adj <= endH;
  const nowFrac = Math.max(0, Math.min(1, (adj - startH) / (endH - startH)));
  const nowX = nowFrac * w;
  const nowY = (h - 4) - getActivityLevel(date) * (h - 8);
  const labels = [
    [(18 - startH) / (endH - startH) * w, '6P'],
    [(20 - startH) / (endH - startH) * w, '8P'],
    [(22 - startH) / (endH - startH) * w, '10P'],
    [(24 - startH) / (endH - startH) * w, '12A'],
    [(26 - startH) / (endH - startH) * w, '2A'],
  ];
  const labelMarks = labels.map(([x, t]) => `<text x="${x}" y="${h}" text-anchor="middle" font-size="8" fill="#475569">${t}</text>`).join('');
  return `
    <svg viewBox="0 0 ${w} ${h + 8}" preserveAspectRatio="none" class="w-full" style="height:${h + 8}px;">
      <defs>
        <linearGradient id="curve-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(167,139,250,0.45)"/>
          <stop offset="100%" stop-color="rgba(167,139,250,0)"/>
        </linearGradient>
      </defs>
      <path d="${fillD}" fill="url(#curve-fill)"/>
      <path d="${pathD}" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${inRange ? `
        <line x1="${nowX}" y1="0" x2="${nowX}" y2="${h - 4}" stroke="#fb7185" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
        <circle cx="${nowX}" cy="${nowY}" r="9" fill="#fb7185" opacity="0.25" class="live-ping"/>
        <circle cx="${nowX}" cy="${nowY}" r="4" fill="#fb7185" stroke="#fff" stroke-width="1.2"/>
      ` : ''}
      ${labelMarks}
    </svg>`;
}

   LEAFLET MAP
   ========================================================== */
let map = null, heatLayer = null;
let markerObjs = [];

function initMap() {
  map = L.map('map', {
    zoomControl: false, attributionControl: false,
    scrollWheelZoom: true, doubleClickZoom: true, boxZoom: false,
  }).setView([38.9101, -77.025], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd',
  }).addTo(map);
  L.control.attribution({ position: 'bottomleft', prefix: '' }).addAttribution('© OSM · CARTO').addTo(map);
  document.getElementById('map-loading')?.remove();
  initHeatLayer();
  rebuildMarkers();
  updateMapData();
}

function initHeatLayer() {
  if (heatLayer) map.removeLayer(heatLayer);
  heatLayer = L.heatLayer([], {
    radius: 55, blur: 38, maxZoom: 17, max: 1.0, minOpacity: 0.35,
    gradient: { 0.0:'rgba(80,30,160,0)', 0.2:'#5b21b6', 0.4:'#be185d', 0.6:'#dc2626', 0.8:'#ea580c', 1.0:'#facc15' },
  }).addTo(map);
}

function rebuildMarkers() {
  if (!map) return;
  markerObjs.forEach(m => map.removeLayer(m.marker));
  markerObjs = [];
  const a = APPS[state.app];
  const ctx = getTimeContext(state.now);
  const numberPrefix = ctx.isLive ? '' : '~';
  const borderStyle = ctx.isLive ? 'solid' : 'dashed';

  VENUES.forEach(v => {
    const stats = liveValues[v.id] || { tinder:{total:0,guys:0,girls:0}, bumble:{total:0,guys:0,girls:0}, hinge:{total:0,guys:0,girls:0} };
    const count = getAppCount(stats);
    const r = getAppRatio(stats);

    const appIcon =
      state.app === 'tinder' ? `<svg width="8" height="8" viewBox="0 0 24 24"><path d="M12 2c2 5 6 6 6 11a6 6 0 0 1-12 0c0-3 2-5 3-7 1 1 1 3 2 4 0-3-1-6 1-8z" fill="${a.color}"/></svg>`
    : state.app === 'bumble' ? `<svg width="8" height="8" viewBox="0 0 24 24"><polygon points="12,2 22,7 22,17 12,22 2,17 2,7" fill="${a.color}"/></svg>`
    : state.app === 'hinge'  ? `<svg width="8" height="8" viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12" stroke="${a.color}" stroke-width="3" stroke-linecap="round" fill="none"/></svg>`
    : `<svg width="8" height="8" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="3" fill="#fb7185"/><circle cx="12" cy="12" r="3" fill="#facc15"/><circle cx="18" cy="12" r="3" fill="#a78bfa"/></svg>`;

    const html = `
      <div data-marker-id="${v.id}" style="position:relative;display:flex;flex-direction:column;align-items:center;transform:translateY(-4px);cursor:pointer;">
        <div style="
          display:flex;flex-direction:column;
          background:rgba(15,10,30,0.94);
          border:1px ${borderStyle} ${hexToRgba(a.color, 0.5)};
          border-radius:10px;
          padding:4px 7px;
          box-shadow:0 4px 14px rgba(124,58,237,0.35), 0 2px 6px rgba(0,0,0,0.5);
          white-space:nowrap;margin-bottom:3px;
        ">
          <div style="display:flex;align-items:center;gap:5px;">
            <span style="display:inline-flex;align-items:center;">
              ${icons.wingBadge(13)}
            </span>
            <span style="color:#fff;font-size:10px;font-weight:600;flex:1;">${v.name}</span>
            <span style="display:inline-flex;align-items:center;gap:2px;color:${a.color};font-size:10px;font-weight:700;">
              ${appIcon}<span data-count>${numberPrefix}${count}</span>
            </span>
          </div>
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px;">
            <span style="color:#60a5fa;font-size:9px;font-weight:700;" data-guys>${numberPrefix}${r.guys}</span>
            <span data-donut style="display:inline-flex;">${genderDonutSolid(r.guys, r.girls, 16)}</span>
            <span style="color:#fb7185;font-size:9px;font-weight:700;" data-girls>${numberPrefix}${r.girls}</span>
          </div>
        </div>
        <div style="width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7c3aed);border:2.5px solid #fff;box-shadow:0 0 14px rgba(167,139,250,0.8), 0 2px 6px rgba(0,0,0,0.6);"></div>
      </div>`;

    const icon = L.divIcon({ html, className: 'wing-pin-wrap', iconSize: [200, 70], iconAnchor: [100, 70] });
    const marker = L.marker([v.lat, v.lng], { icon, riseOnHover: true }).addTo(map);
    marker.on('click', () => selectVenue(v.id));

    const root = marker._icon;
    markerObjs.push({
      marker, venueId: v.id,
      countEl: root?.querySelector('[data-count]'),
      guysEl:  root?.querySelector('[data-guys]'),
      girlsEl: root?.querySelector('[data-girls]'),
      donutEl: root?.querySelector('[data-donut]'),
    });
  });
}

function updateMarkerCounts() {
  const ctx = getTimeContext(state.now);
  const numberPrefix = ctx.isLive ? '' : '~';
  for (const m of markerObjs) {
    if (!m.countEl) {
      m.countEl = m.marker._icon?.querySelector('[data-count]');
      m.guysEl  = m.marker._icon?.querySelector('[data-guys]');
      m.girlsEl = m.marker._icon?.querySelector('[data-girls]');
      m.donutEl = m.marker._icon?.querySelector('[data-donut]');
      if (!m.countEl) continue;
    }
    const stats = liveValues[m.venueId];
    const r = getAppRatio(stats);
    const newCount = `${numberPrefix}${getAppCount(stats)}`;
    const newGuys  = `${numberPrefix}${r.guys}`;
    const newGirls = `${numberPrefix}${r.girls}`;
    if (m.countEl.textContent !== newCount) m.countEl.textContent = newCount;
    if (m.guysEl  && m.guysEl.textContent  !== newGuys)  m.guysEl.textContent  = newGuys;
    if (m.girlsEl && m.girlsEl.textContent !== newGirls) m.girlsEl.textContent = newGirls;
    if (m.donutEl) m.donutEl.innerHTML = genderDonutSolid(r.guys, r.girls, 16);
  }
}

function updateHeatmap() {
  if (!heatLayer) return;
  const points = VENUES.map(v => {
    const s = liveValues[v.id];
    const w = (s?.activity || 0) * (0.4 + v.pop * 0.6);
    return [v.lat, v.lng, Math.max(0.05, Math.min(1, w))];
  });
  heatLayer.setLatLngs(points);
}

function updateMapData() { updateMarkerCounts(); updateHeatmap(); }

/* ==========================================================
   RENDER
   ========================================================== */
function applyPredictionMode() {
  const ctx = getTimeContext(state.now);
  document.body.classList.toggle('prediction-mode', !ctx.isLive);
  if (lastIsLive !== null && lastIsLive !== ctx.isLive) rebuildMarkers();
  lastIsLive = ctx.isLive;
}

function renderShell() {
  document.getElementById('header').innerHTML = headerHtml();
  document.getElementById('bottom-nav').innerHTML = bottomNavHtml();
  document.getElementById('status-time').textContent = state.now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: false });
  applyPredictionMode();
}

function renderTabContent() {
  const showMap = state.tab === 'map';
  document.getElementById('map-section').style.display = showMap ? 'block' : 'none';
  const content = document.getElementById('content');
  if (showMap) content.innerHTML = mapTabHtml();
  else if (state.tab === 'hotspots') content.innerHTML = hotspotsTabHtml();
  else if (state.tab === 'venues')   content.innerHTML = venueDetailHtml();
  else if (state.tab === 'profile')  content.innerHTML = profileTabHtml();
  if (showMap && map) setTimeout(() => map.invalidateSize(), 0);
}

function fullRender() {
  renderShell();
  renderTabContent();
  updateMapData();
}

/* ==========================================================
   EVENT HANDLERS
   ========================================================== */
function selectVenue(id) {
  state.selectedId = id;
  state.tab = 'venues';
  fullRender();
  document.getElementById('scroll-container').scrollTop = 0;
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'set-tab') {
    state.tab = btn.dataset.tab;
    fullRender();
    document.getElementById('scroll-container').scrollTop = 0;
  } else if (action === 'set-app') {
    state.app = btn.dataset.app;
    fullRender();
    rebuildMarkers();
  } else if (action === 'select-venue') {
    selectVenue(btn.dataset.id);
  }
});

/* ==========================================================
   TICK
   ========================================================== */
function tick() {
  tickSimulation();
  const headerClock = document.getElementById('header-clock');
  if (headerClock) headerClock.textContent = fmtTimeShort(state.now);
  const tickerTotal = document.getElementById('ticker-total');
  if (tickerTotal) {
    const ctx = getTimeContext(state.now);
    const prefix = ctx.isLive ? '' : '~';
    tickerTotal.textContent = `${prefix}${totalForCurrentApp()}`;
  }
  const statusTime = document.getElementById('status-time');
  if (statusTime) statusTime.textContent = state.now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: false });
  const nowClock = document.getElementById('now-clock');
  if (nowClock) nowClock.textContent = fmtTime(state.now);
  const profileClock = document.getElementById('profile-clock');
  if (profileClock) profileClock.textContent = fmtTime(state.now);

  applyPredictionMode();
  updateMapData();

  if (state.tab === 'venues') {
    renderTabContent();
  } else if (Date.now() - lastListRefresh > 3000) {
    renderTabContent();
    lastListRefresh = Date.now();
  }
}

/* ==========================================================
   INIT
   ========================================================== */
tickSimulation();
fullRender();

function tryInitMap() {
  if (typeof L === 'undefined' || !L.heatLayer) return setTimeout(tryInitMap, 100);
  initMap();
}
tryInitMap();

setInterval(tick, 1000);
</script>
</body>
</html>
