<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MissingLink — Admin</title>
<link rel="icon" href="https://raw.githubusercontent.com/PotentiallyARobot/MissingLink-Extras/main/image-edit-studio/static/app_logo.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#E8A917;--gold-light:#F5C842;--gold-dim:rgba(232,169,23,.08);
  --black:#09090B;--surface:#111113;--surface-2:#18181B;--surface-3:#1F1F23;
  --border:#27272A;--border-light:#3F3F46;
  --text:#E4E4E7;--text-dim:#A1A1AA;--text-muted:#71717A;
  --red:#EF4444;--green:#22C55E;
  --font-display:'Space Mono','JetBrains Mono',monospace;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
  --font-body:'DM Sans','Segoe UI',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
html,body{height:100%}
body{background:var(--black);color:var(--text);font-family:var(--font-body);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}

/* Header */
.hdr{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;padding:12px 22px;background:var(--surface);border-bottom:1px solid var(--border)}
.hdr h1{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-dim)}
.hdr h1 span{color:var(--gold)}
.hdr .crumbs{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:8px}
.hdr .crumbs a{color:var(--text-dim);text-decoration:none;cursor:pointer}
.hdr .crumbs a:hover{color:var(--gold)}
.hdr .crumbs .sep{color:var(--border-light)}
.hdr .crumbs .cur{color:var(--gold)}
.hdr .spacer{flex:1}
.hdr .topnav{display:flex;gap:4px;margin-left:6px}
.hdr .topnav .navlink{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-decoration:none;cursor:pointer;padding:5px 12px;border-radius:5px;border:1px solid transparent}
.hdr .topnav .navlink:hover{color:var(--text)}
.hdr .topnav .navlink.active{color:var(--gold);border-color:var(--border-light)}
.hdr .me{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:4px 10px;border:1px solid var(--border);border-radius:4px}
.hdr .me b{color:var(--gold);font-weight:600}

/* Search */
.toolbar{display:flex;align-items:center;gap:12px;padding:14px 22px;background:var(--surface);border-bottom:1px solid var(--border)}
.search{flex:1;max-width:420px;position:relative}
.search input{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:8px 12px 8px 32px;border-radius:6px;outline:none;transition:border-color .15s}
.search input:focus{border-color:var(--gold)}
.search::before{content:"⌕";position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}
.stat{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:5px 11px;border:1px solid var(--border);border-radius:4px}
.stat b{color:var(--text);font-weight:600}

/* Body */
main{padding:22px;max-width:1400px;margin:0 auto}

/* Users grid (folders) */
.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s}
.user-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,169,23,.06)}
.user-card .thumbs{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,80px);gap:2px;background:var(--surface-3);aspect-ratio:3/2}
.user-card .thumbs .t{position:relative;overflow:hidden;background:var(--surface-2)}
.user-card .thumbs .t.big{grid-column:1/3;grid-row:1/3}
.user-card .thumbs .t.more{display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:var(--surface-3);font-weight:600}
.user-card .thumbs img{width:100%;height:100%;object-fit:cover;display:block;background:var(--surface-3)}
.user-card .thumbs .empty{display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-family:var(--font-mono);font-size:10px;grid-column:1/-1;grid-row:1/-1}
.user-card .meta{padding:12px 14px;display:flex;align-items:center;gap:10px}
.user-card .av{width:32px;height:32px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0;overflow:hidden}
.user-card .av img{width:100%;height:100%;object-fit:cover}
.user-card .info{flex:1;min-width:0}
.user-card .em{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-card .sub{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px}
.user-card .sub .count{color:var(--gold)}

/* Generations grid (drill-down) */
.user-header{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);padding:18px 20px;border-radius:10px;margin-bottom:18px}
.user-header .av{width:56px;height:56px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--gold);overflow:hidden;flex-shrink:0}
.user-header .av img{width:100%;height:100%;object-fit:cover}
.user-header h2{font-size:18px;font-weight:600;color:var(--text)}
.user-header .em{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-top:3px}
.user-header .stats{display:flex;gap:14px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:6px}
.user-header .stats b{color:var(--gold)}
.user-header .back{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-decoration:none;border:1px solid var(--border);padding:6px 12px;border-radius:5px;cursor:pointer}
.user-header .back:hover{color:var(--gold);border-color:var(--gold)}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);padding:7px 16px;border-radius:6px;cursor:pointer}
.tab-btn:hover{color:var(--text);border-color:var(--text-muted)}
.tab-btn.active{color:var(--gold);border-color:var(--gold);background:var(--surface-3)}
/* Stats page */
.stats-controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.stats-controls label{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:7px}
.stats-controls select,.stats-controls input{font-family:var(--font-mono);font-size:12px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:5px 9px}
.stats-controls input{width:90px}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.scard .k{font-family:var(--font-mono);font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted)}
.scard .v{font-size:22px;font-weight:700;color:var(--text);margin-top:5px}
.scard .v.gold{color:var(--gold)}
.scard .sub{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-top:3px}
.stats-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px}
.stats-table th,.stats-table td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--border)}
.stats-table th{color:var(--text-muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:var(--bg)}
.stats-table td:first-child,.stats-table th:first-child{text-align:left;color:var(--text-dim)}
.stats-table tbody tr:hover{background:var(--surface)}
.stats-table td.cost{color:var(--gold)}
.stats-note{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);line-height:1.6;margin-top:14px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px}

.gens-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.gen{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .12s,transform .12s}
.gen:hover{border-color:var(--gold);transform:translateY(-2px)}
.gen .img{aspect-ratio:1;background:var(--surface-3);position:relative;overflow:hidden}
.gen .img img{width:100%;height:100%;object-fit:cover;display:block}
.gen .img .mode{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);color:var(--gold);font-family:var(--font-mono);font-size:9px;padding:3px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.gen .img .inbadge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.65);color:var(--text-dim);font-family:var(--font-mono);font-size:9px;padding:3px 7px;border-radius:3px;display:flex;align-items:center;gap:3px}
.gen .img .inbadge b{color:var(--gold);font-weight:600}
.gen .cap{padding:9px 12px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
.gen .cap .prompt{color:var(--text-dim);font-family:var(--font-body);font-size:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;line-height:1.35}

/* Load more / states */
.loader{display:flex;justify-content:center;padding:32px 0}
.btn{background:var(--surface-2);color:var(--text);border:1px solid var(--border);font-family:var(--font-mono);font-size:11px;padding:9px 22px;border-radius:6px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:80px 20px;color:var(--text-muted);font-family:var(--font-mono);font-size:12px}
.error-state{text-align:center;padding:80px 20px;color:var(--red);font-family:var(--font-mono);font-size:12px}
.error-state .h{font-size:14px;color:var(--text);margin-bottom:8px;font-family:var(--font-body);font-weight:600}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;align-items:center;justify-content:center;padding:40px}
.lb.open{display:flex}
.lb img{max-width:100%;max-height:calc(100vh - 140px);display:block;border-radius:6px}
.lb .info{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);max-width:80%;background:rgba(20,20,23,.95);border:1px solid var(--border);padding:14px 20px;border-radius:8px;font-family:var(--font-mono);font-size:11px}
.lb .info .p{color:var(--text);font-family:var(--font-body);font-size:13px;margin-bottom:8px;max-height:80px;overflow-y:auto;line-height:1.5}
.lb .info .meta{color:var(--text-muted);display:flex;gap:14px;flex-wrap:wrap}
.lb .info .meta b{color:var(--gold)}
.lb .info .frames{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.lb .info .frames .lbl{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.lb .info .frames .arrow{color:var(--text-muted);font-size:13px;margin:0 2px}
.lb .info .frames img{width:46px;height:46px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:var(--surface-3);transition:border-color .12s}
.lb .info .frames img:hover{border-color:var(--gold)}
.lb .info .frames img.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.lb .close{position:absolute;top:20px;right:20px;background:var(--surface);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb .close:hover{border-color:var(--gold);color:var(--gold)}

/* Auth gate — hide everything until the server confirms admin */
#app{display:none}
body.ready #app{display:block}
body.ready #splash{display:none}
#splash{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:1000;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
#splash .spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
#splash.denied .spinner{display:none}
#splash .msg{letter-spacing:.5px}
#splash .sub{font-size:10px;color:var(--text-muted)}
#splash .sub a{color:var(--gold);text-decoration:none}
#splash .sub a:hover{text-decoration:underline}
#splash.denied .msg{color:var(--red);font-size:14px;font-family:var(--font-body);font-weight:600}
</style>
</head>
<body>

<div id="splash">
  <div class="spinner"></div>
  <div class="msg">verifying access…</div>
</div>

<div id="app">
<header class="hdr">
  <h1>MISSING<span>·</span>LINK / ADMIN</h1>
  <nav class="topnav">
    <a id="nav-users" class="navlink active">Users</a>
    <a id="nav-stats" class="navlink">Stats</a>
  </nav>
  <div class="crumbs" id="crumbs">
    <a id="crumb-home">Users</a>
  </div>
  <div class="spacer"></div>
  <div class="me" id="me">…</div>
</header>

<div class="toolbar" id="toolbar">
  <div class="search">
    <input id="search" type="text" placeholder="Filter by email or name…" autocomplete="off">
  </div>
  <div class="stat" id="stat-total">Loading…</div>
</div>

<main id="main">
  <div class="loader"><div class="spinner"></div></div>
</main>

<div class="lb" id="lb">
  <button class="close" id="lb-close">✕</button>
  <img id="lb-img" alt="">
  <div class="info" id="lb-info"></div>
</div>

</div><!-- /#app -->

<script>
"use strict";

const PAGE_SIZE = 20;
const state = {
  view: "users",      // "users" | "user" | "stats"
  tab: "gens",        // within "user" view: "gens" | "uploads"
  userId: null,
  users: [],
  usersOffset: 0,
  usersDone: false,
  gens: [],
  gensOffset: 0,
  gensDone: false,
  uploads: [],
  uploadsOffset: 0,
  uploadsDone: false,
  uploadsTotal: 0,
  currentUser: null,
  filter: "",
  loading: false,
  stats: null,        // last loaded stats payload
  statsDays: 30,      // selected window
  statsRate: 0.001036,// $/GPU-sec (editable; default Modal A100-40GB base)
};

// ── helpers ─────────────────────────────────────────────────────
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtDate = (sec) => {
  if (!sec) return "—";
  const d = new Date(sec * 1000);
  const now = Date.now();
  const diff = (now - d.getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60) + "m ago";
  if (diff < 86400) return Math.floor(diff/3600) + "h ago";
  if (diff < 86400*30) return Math.floor(diff/86400) + "d ago";
  return d.toLocaleDateString();
};

async function api(path, opts={}) {
  // Abort slow requests instead of hanging forever. The admin boot probe
  // gates the whole UI on its first /users call; without a ceiling a slow
  // query (e.g. a user with a massive batch) leaves the splash spinning with
  // no way out. 25s is generous headroom over the normal response time.
  const ms = opts.timeoutMs || 25000;
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  let r;
  try {
    r = await fetch(path, { credentials: "include", signal: ctrl.signal, ...opts });
  } catch (e) {
    if (e.name === "AbortError") throw new Error("timeout — the server took too long to respond");
    throw e;
  } finally {
    clearTimeout(t);
  }
  if (r.status === 401) {
    showDenied("Not signed in", '<a href="/studio.html">Go to Studio →</a>');
    throw new Error("not_logged_in");
  }
  if (r.status === 403) {
    showDenied("Access denied", 'This page is restricted. <a href="/studio.html">← Studio</a>');
    throw new Error("forbidden");
  }
  const data = await r.json().catch(() => ({}));
  if (!r.ok || data?.ok === false) {
    throw new Error(data?.error || ("HTTP " + r.status));
  }
  return data;
}

function showDenied(msg, subHtml) {
  const splash = document.getElementById("splash");
  splash.classList.add("denied");
  splash.innerHTML = '<div class="msg">' + msg + '</div>' +
    (subHtml ? '<div class="sub">' + subHtml + '</div>' : '');
  // Keep #app hidden — body.ready is never set on the denied path.
}

// ── crumbs ──────────────────────────────────────────────────────
function renderCrumbs() {
  const c = $("#crumbs");
  if (state.view === "users") {
    c.innerHTML = '<span class="cur">Users</span>';
  } else if (state.view === "stats") {
    c.innerHTML = '<span class="cur">Stats</span>';
  } else {
    const email = state.currentUser?.email || state.userId;
    c.innerHTML = '<a id="crumb-home">Users</a><span class="sep">/</span><span class="cur">' + esc(email) + '</span>';
    $("#crumb-home").onclick = () => navigate("users");
  }
}

// ── users view ──────────────────────────────────────────────────
async function loadUsersBatch() {
  if (state.loading || state.usersDone) return;
  state.loading = true;
  renderLoader();
  try {
    const params = new URLSearchParams({ limit: String(PAGE_SIZE), offset: String(state.usersOffset) });
    if (state.filter) params.set("q", state.filter);
    const data = await api("/api/studio/admin/users?" + params.toString());
    state.users.push(...(data.users || []));
    state.usersOffset += (data.users || []).length;
    state.usersDone = !data.has_more;
    if (typeof data.total === "number") {
      $("#stat-total").innerHTML = "<b>" + data.total.toLocaleString() + "</b> user" + (data.total === 1 ? "" : "s");
    }
  } catch (e) {
    renderError(e.message);
    state.loading = false;
    return;
  }
  state.loading = false;
  renderUsersView();
}

function renderUsersView() {
  if (state.view !== "users") return;
  const main = $("#main");
  if (state.users.length === 0 && !state.loading) {
    main.innerHTML = '<div class="empty-state">No users match.</div>';
    return;
  }
  let html = '<div class="users-grid" id="ug">';
  for (const u of state.users) html += userCardHtml(u);
  html += '</div>';
  if (!state.usersDone) {
    html += '<div class="loader" id="loader-anchor"><button class="btn" id="loadmore">Load more</button></div>';
  } else if (state.users.length > 0) {
    html += '<div class="empty-state">— end —</div>';
  }
  main.innerHTML = html;
  for (const card of main.querySelectorAll(".user-card")) {
    card.onclick = () => navigate("user", card.dataset.uid);
  }
  const lm = $("#loadmore");
  if (lm) {
    lm.onclick = loadUsersBatch;
    setupInfiniteScroll($("#loader-anchor"), loadUsersBatch);
  }
}

function userCardHtml(u) {
  const initial = (u.email || "?").trim().charAt(0).toUpperCase();
  const av = u.picture
    ? '<img src="' + esc(u.picture) + '" alt="" referrerpolicy="no-referrer">'
    : esc(initial);
  const thumbs = Array.isArray(u.thumbs) ? u.thumbs : [];
  let thumbsHtml = '';
  if (thumbs.length === 0) {
    thumbsHtml = '<div class="empty">no generations yet</div>';
  } else {
    // 1 big + 4 small if we have 5; otherwise show what we have
    const n = Math.min(5, thumbs.length);
    for (let i = 0; i < n; i++) {
      const cls = (i === 0 && n > 1) ? "t big" : "t";
      thumbsHtml += '<div class="' + cls + '"><img loading="lazy" src="' + esc(thumbs[i]) + '" alt=""></div>';
    }
    // If user has more than what we showed, add a +N tile
    if (u.gen_count > n) {
      thumbsHtml += '<div class="t more">+' + (u.gen_count - n) + '</div>';
    } else {
      // pad with empty cells so layout looks consistent
      for (let i = n; i < 5; i++) thumbsHtml += '<div class="t"></div>';
    }
  }
  const name = u.name && u.name !== u.email ? u.name : "";
  return (
    '<div class="user-card" data-uid="' + esc(u.id) + '">' +
      '<div class="thumbs">' + thumbsHtml + '</div>' +
      '<div class="meta">' +
        '<div class="av">' + av + '</div>' +
        '<div class="info">' +
          '<div class="em">' + esc(u.email) + '</div>' +
          '<div class="sub">' +
            '<span class="count">' + (u.gen_count || 0) + ' gen' + (u.gen_count === 1 ? "" : "s") + '</span>' +
            '<span>·</span>' +
            '<span class="count">' + (u.upload_count || 0) + ' upload' + (u.upload_count === 1 ? "" : "s") + '</span>' +
            '<span>·</span>' +
            '<span>last seen ' + fmtDate(u.last_login || u.created_at) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

// ── user (generations) view ─────────────────────────────────────
async function loadUserGens(reset=false) {
  if (state.loading) return;
  if (!reset && state.gensDone) return;
  state.loading = true;
  if (reset) renderLoader();
  try {
    const params = new URLSearchParams({ limit: String(PAGE_SIZE), offset: String(state.gensOffset) });
    const data = await api("/api/studio/admin/user/" + encodeURIComponent(state.userId) + "/generations?" + params.toString());
    state.gens.push(...(data.generations || []));
    state.gensOffset += (data.generations || []).length;
    state.gensDone = !data.has_more;
    if (data.user) state.currentUser = data.user;
    if (typeof data.total === "number") {
      $("#stat-total").innerHTML = "<b>" + data.total.toLocaleString() + "</b> generation" + (data.total === 1 ? "" : "s");
    }
  } catch (e) {
    renderError(e.message);
    state.loading = false;
    return;
  }
  state.loading = false;
  renderUserView();
}

// ── user uploads (source images) loader ─────────────────────────
// Distinct from generations: lists studio_uploads rows. A user can have
// zero generations but many uploads — these are the source images the
// wipe/ban purge removes, so being able to review them before acting is
// the whole point of this tab.
async function loadUserUploads(reset=false) {
  if (state.loading) return;
  if (!reset && state.uploadsDone) return;
  state.loading = true;
  if (reset) renderLoader();
  try {
    const params = new URLSearchParams({ limit: String(PAGE_SIZE), offset: String(state.uploadsOffset) });
    const data = await api("/api/studio/admin/user/" + encodeURIComponent(state.userId) + "/uploads?" + params.toString());
    state.uploads.push(...(data.uploads || []));
    state.uploadsOffset += (data.uploads || []).length;
    state.uploadsDone = !data.has_more;
    if (typeof data.total === "number") state.uploadsTotal = data.total;
    if (data.user) state.currentUser = data.user;
    if (typeof data.total === "number") {
      $("#stat-total").innerHTML = "<b>" + data.total.toLocaleString() + "</b> upload" + (data.total === 1 ? "" : "s");
    }
  } catch (e) {
    renderError(e.message);
    state.loading = false;
    return;
  }
  state.loading = false;
  renderUserView();
}

function renderUserView() {
  if (state.view !== "user") return;
  const main = $("#main");
  const u = state.currentUser || { email: state.userId };
  const initial = (u.email || "?").trim().charAt(0).toUpperCase();
  const av = u.picture
    ? '<img src="' + esc(u.picture) + '" alt="" referrerpolicy="no-referrer">'
    : esc(initial);

  const genCount = (u.gen_count != null ? u.gen_count : state.gens.length);
  const upCount = (u.upload_count != null ? u.upload_count : state.uploadsTotal);

  let header = (
    '<div class="user-header">' +
      '<div class="av">' + av + '</div>' +
      '<div>' +
        '<h2>' + esc(u.name || u.email) + '</h2>' +
        '<div class="em">' + esc(u.email) + '</div>' +
        '<div class="stats">' +
          '<span><b>' + genCount + '</b> generations</span>' +
          '<span>·</span>' +
          '<span><b>' + upCount + '</b> uploads</span>' +
          '<span>·</span>' +
          '<span>joined ' + fmtDate(u.created_at) + '</span>' +
          '<span>·</span>' +
          '<span>last login ' + fmtDate(u.last_login) + '</span>' +
          (u.tokens != null ? '<span>·</span><span><b>' + u.tokens + '</b> tokens</span>' : '') +
        '</div>' +
      '</div>' +
      '<a class="back" id="back-btn">← back</a>' +
    '</div>' +
    // Tab switcher between generations and uploaded source images.
    '<div class="tabs">' +
      '<button class="tab-btn' + (state.tab === "gens" ? " active" : "") + '" id="tab-gens">Generations</button>' +
      '<button class="tab-btn' + (state.tab === "uploads" ? " active" : "") + '" id="tab-uploads">Uploads</button>' +
    '</div>'
  );

  let gridHtml;
  if (state.tab === "uploads") {
    if (state.uploads.length === 0 && state.uploadsDone) {
      gridHtml = '<div class="empty-state">No uploads.</div>';
    } else {
      gridHtml = '<div class="gens-grid">';
      for (const up of state.uploads) gridHtml += uploadCardHtml(up);
      gridHtml += '</div>';
      if (!state.uploadsDone) {
        gridHtml += '<div class="loader" id="loader-anchor"><button class="btn" id="loadmore">Load more</button></div>';
      } else if (state.uploads.length > 0) {
        gridHtml += '<div class="empty-state">— end —</div>';
      }
    }
  } else {
    if (state.gens.length === 0 && state.gensDone) {
      gridHtml = '<div class="empty-state">No generations.</div>';
    } else {
      gridHtml = '<div class="gens-grid">';
      for (const g of state.gens) gridHtml += genCardHtml(g);
      gridHtml += '</div>';
      if (!state.gensDone) {
        gridHtml += '<div class="loader" id="loader-anchor"><button class="btn" id="loadmore">Load more</button></div>';
      } else if (state.gens.length > 0) {
        gridHtml += '<div class="empty-state">— end —</div>';
      }
    }
  }

  main.innerHTML = header + gridHtml;
  $("#back-btn").onclick = () => navigate("users");
  $("#tab-gens").onclick = () => switchTab("gens");
  $("#tab-uploads").onclick = () => switchTab("uploads");

  if (state.tab === "uploads") {
    for (const card of main.querySelectorAll(".gen")) {
      card.onclick = () => openUploadLightbox(card.dataset.id);
    }
    const lm = $("#loadmore");
    if (lm) {
      lm.onclick = () => loadUserUploads(false);
      setupInfiniteScroll($("#loader-anchor"), () => loadUserUploads(false));
    }
  } else {
    for (const card of main.querySelectorAll(".gen")) {
      card.onclick = () => openLightbox(card.dataset.id);
    }
    const lm = $("#loadmore");
    if (lm) {
      lm.onclick = () => loadUserGens(false);
      setupInfiniteScroll($("#loader-anchor"), () => loadUserGens(false));
    }
  }
}

// Switch between the generations and uploads tabs. Lazy-loads the uploads
// list the first time that tab is opened (gens are already loaded on entry).
function switchTab(tab) {
  if (state.tab === tab) return;
  state.tab = tab;
  if (tab === "uploads" && state.uploads.length === 0 && !state.uploadsDone) {
    loadUserUploads(true);
  } else {
    renderUserView();
  }
}

function uploadCardHtml(up) {
  return (
    '<div class="gen" data-id="' + esc(up.id) + '">' +
      '<div class="img">' +
        '<img loading="lazy" src="' + esc(up.url) + '" alt="">' +
        '<div class="mode">upload</div>' +
      '</div>' +
      '<div class="cap">' +
        (up.filename ? '<div class="prompt">' + esc(up.filename) + '</div>' : '') +
        fmtDate(up.created_at) +
      '</div>' +
    '</div>'
  );
}

// Simple lightbox for an upload — no input/output frames, just the image
// and its metadata.
function openUploadLightbox(upId) {
  const up = state.uploads.find(x => x.id === upId);
  if (!up) return;
  $("#lb-img").src = up.url;
  $("#lb-info").innerHTML =
    (up.filename ? '<div class="p">' + esc(up.filename) + '</div>' : '') +
    '<div class="meta">' +
      '<span>id: ' + esc(up.id) + '</span>' +
      '<span>uploaded ' + fmtDate(up.created_at) + '</span>' +
    '</div>';
  $("#lb").classList.add("open");
}

// ── stats page ──────────────────────────────────────────────────
// Formats seconds as a compact "Hh Mm" / "Mm Ss" string for readability.
function fmtDur(sec) {
  sec = Math.round(sec || 0);
  if (sec < 60) return sec + "s";
  if (sec < 3600) return Math.floor(sec / 60) + "m " + (sec % 60) + "s";
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + "h " + m + "m";
}
function fmtUSD(n) {
  return "$" + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

async function loadStats() {
  if (state.loading) return;
  state.loading = true;
  renderLoader();
  try {
    const data = await api("/api/studio/admin/stats?days=" + encodeURIComponent(state.statsDays));
    state.stats = data;
    // Seed the rate input from the server default the first time only; if
    // the admin has already typed a custom rate, keep theirs.
    if (state.statsRate == null && typeof data.gpu_rate_per_sec === "number") {
      state.statsRate = data.gpu_rate_per_sec;
    }
    $("#stat-total").innerHTML = "<b>" + (data.totals?.distinct_active_users || 0).toLocaleString() +
      "</b> active user" + ((data.totals?.distinct_active_users === 1) ? "" : "s") + " / " + data.days + "d";
  } catch (e) {
    renderError(e.message);
    state.loading = false;
    return;
  }
  state.loading = false;
  renderStatsView();
}

function renderStatsView() {
  if (state.view !== "stats") return;
  const main = $("#main");
  const s = state.stats;
  if (!s) { main.innerHTML = '<div class="empty-state">No stats.</div>'; return; }

  const rate = (typeof state.statsRate === "number" && isFinite(state.statsRate)) ? state.statsRate : (s.gpu_rate_per_sec || 0);
  const t = s.totals || {};
  const gpuCost = (t.gpu_seconds || 0) * rate;
  const wallCost = (t.wall_seconds || 0) * rate;

  // Controls: window selector + editable $/sec rate.
  const controls =
    '<div class="stats-controls">' +
      '<label>Window ' +
        '<select id="stats-days">' +
          [7, 14, 30, 60, 90, 180].map(function(d){
            return '<option value="' + d + '"' + (d === s.days ? ' selected' : '') + '>' + d + ' days</option>';
          }).join('') +
        '</select>' +
      '</label>' +
      '<label>$ / GPU-sec ' +
        '<input id="stats-rate" type="number" step="0.000001" min="0" value="' + rate + '">' +
      '</label>' +
      '<span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">' +
        esc(s.gpu_label || "GPU") + ' · base ' + (s.gpu_rate_per_sec || 0) + '/sec' +
      '</span>' +
    '</div>';

  // Summary cards.
  const cards =
    '<div class="summary-cards">' +
      '<div class="scard"><div class="k">Active users</div><div class="v gold">' + (t.distinct_active_users || 0).toLocaleString() + '</div><div class="sub">distinct, in window</div></div>' +
      '<div class="scard"><div class="k">Generations done</div><div class="v">' + (t.jobs_done || 0).toLocaleString() + '</div><div class="sub">of ' + (t.jobs || 0).toLocaleString() + ' submitted</div></div>' +
      '<div class="scard"><div class="k">GPU inference time</div><div class="v">' + fmtDur(t.gpu_seconds) + '</div><div class="sub">Σ reported elapsed</div></div>' +
      '<div class="scard"><div class="k">Est. inference cost</div><div class="v gold">' + fmtUSD(gpuCost) + '</div><div class="sub">≈ lower bound</div></div>' +
      '<div class="scard"><div class="k">Wall-clock GPU time</div><div class="v">' + fmtDur(t.wall_seconds) + '</div><div class="sub">claim→done, ≈ upper bound</div></div>' +
      '<div class="scard"><div class="k">Est. wall cost</div><div class="v gold">' + fmtUSD(wallCost) + '</div><div class="sub">≈ upper bound</div></div>' +
    '</div>';

  // Daily table (newest first for at-a-glance recent days).
  let rows = '';
  const daily = (s.daily || []).slice().reverse();
  for (const d of daily) {
    const c = (d.gpu_seconds || 0) * rate;
    rows +=
      '<tr>' +
        '<td>' + esc(d.day) + '</td>' +
        '<td>' + (d.active_users || 0) + '</td>' +
        '<td>' + (d.jobs_done || 0) + '</td>' +
        '<td>' + fmtDur(d.gpu_seconds) + '</td>' +
        '<td>' + fmtDur(d.wall_seconds) + '</td>' +
        '<td class="cost">' + fmtUSD(c) + '</td>' +
      '</tr>';
  }
  const table =
    '<table class="stats-table">' +
      '<thead><tr>' +
        '<th>Day (UTC)</th><th>Active users</th><th>Gens</th>' +
        '<th>GPU time</th><th>Wall time</th><th>Est. cost</th>' +
      '</tr></thead>' +
      '<tbody>' + (rows || '<tr><td colspan="6" style="text-align:center;color:var(--text-dim)">no activity</td></tr>') + '</tbody>' +
    '</table>';

  const note =
    '<div class="stats-note">' +
      'How to read this: <b>GPU inference time</b> sums each job\'s reported compute and is a <b>lower bound</b> on cost — ' +
      'it excludes warm-idle and cold-boot time that Modal still bills. <b>Wall-clock</b> (claim→done) includes overhead and ' +
      'over-counts when jobs run in parallel, so treat it as an <b>upper bound</b>. Your real A100-40GB invoice sits between ' +
      'the two; Modal\'s own dashboard is authoritative. Region multipliers (≈1.25× US/EU) may apply on top of the base rate — ' +
      'adjust the $/GPU-sec field above to match your actual rate.' +
    '</div>';

  main.innerHTML = controls + cards + table + note;

  // Wire controls.
  const daysSel = $("#stats-days");
  if (daysSel) daysSel.onchange = () => { state.statsDays = parseInt(daysSel.value, 10) || 30; loadStats(); };
  const rateInp = $("#stats-rate");
  if (rateInp) rateInp.oninput = () => {
    const v = parseFloat(rateInp.value);
    state.statsRate = isFinite(v) ? v : 0;
    renderStatsView();  // re-render cost columns only; no refetch
  };
}

function genCardHtml(g) {
  const prompt = g.prompt ? '<div class="prompt">' + esc(g.prompt) + '</div>' : '';
  const inCount = Array.isArray(g.inputs) ? g.inputs.length : 0;
  const inBadge = inCount
    ? '<div class="inbadge">⊕ <b>' + inCount + '</b> input' + (inCount === 1 ? '' : 's') + '</div>'
    : '';
  return (
    '<div class="gen" data-id="' + esc(g.id) + '">' +
      '<div class="img">' +
        '<img loading="lazy" src="' + esc(g.url) + '" alt="">' +
        inBadge +
        (g.mode ? '<div class="mode">' + esc(g.mode) + '</div>' : '') +
      '</div>' +
      '<div class="cap">' +
        prompt +
        fmtDate(g.created_at) +
      '</div>' +
    '</div>'
  );
}

// ── lightbox ────────────────────────────────────────────────────
function openLightbox(genId) {
  const g = state.gens.find(x => x.id === genId);
  if (!g) return;
  $("#lb-img").src = g.url;

  const inputs = Array.isArray(g.inputs) ? g.inputs : [];

  // When the generation has source images, build a thumbnail strip:
  // each input, an arrow, then the output. Clicking any thumb swaps the
  // big lightbox image so input and output can be compared in place.
  let framesHtml = '';
  if (inputs.length) {
    framesHtml = '<div class="frames">' +
      '<span class="lbl">input' + (inputs.length === 1 ? '' : 's') + '</span>';
    inputs.forEach((src, i) => {
      framesHtml += '<img data-src="' + esc(src) + '" src="' + esc(src) +
        '" alt="input ' + (i + 1) + '">';
    });
    framesHtml += '<span class="arrow">→</span>' +
      '<span class="lbl">output</span>' +
      '<img class="active" data-src="' + esc(g.url) + '" src="' + esc(g.url) + '" alt="output">' +
    '</div>';
  }

  $("#lb-info").innerHTML =
    (g.prompt ? '<div class="p">' + esc(g.prompt) + '</div>' : '') +
    '<div class="meta">' +
      (g.mode ? '<span>mode: <b>' + esc(g.mode) + '</b></span>' : '') +
      (g.w && g.h ? '<span>size: <b>' + g.w + '×' + g.h + '</b></span>' : '') +
      (g.seed ? '<span>seed: <b>' + g.seed + '</b></span>' : '') +
      (inputs.length ? '<span>inputs: <b>' + inputs.length + '</b></span>' : '') +
      '<span>' + fmtDate(g.created_at) + '</span>' +
      '<span><a href="' + esc(g.url) + '" target="_blank" style="color:var(--gold)">open ↗</a></span>' +
    '</div>' +
    framesHtml;

  // Wire the thumbnails: clicking one swaps the main image + highlight.
  for (const thumb of $("#lb-info").querySelectorAll(".frames img")) {
    thumb.onclick = () => {
      $("#lb-img").src = thumb.dataset.src;
      for (const t of $("#lb-info").querySelectorAll(".frames img")) {
        t.classList.remove("active");
      }
      thumb.classList.add("active");
    };
  }

  $("#lb").classList.add("open");
}
$("#lb-close").onclick = () => $("#lb").classList.remove("open");
$("#lb").onclick = (e) => { if (e.target.id === "lb") $("#lb").classList.remove("open"); };
document.addEventListener("keydown", (e) => { if (e.key === "Escape") $("#lb").classList.remove("open"); });

// ── routing / infinite scroll / helpers ─────────────────────────
function navigate(view, userId) {
  state.view = view;
  if (view === "users") {
    state.userId = null;
    state.currentUser = null;
    location.hash = "";
  } else if (view === "user") {
    state.userId = userId;
    state.tab = "gens";
    state.gens = [];
    state.gensOffset = 0;
    state.gensDone = false;
    state.uploads = [];
    state.uploadsOffset = 0;
    state.uploadsDone = false;
    state.uploadsTotal = 0;
    location.hash = "user/" + userId;
  } else if (view === "stats") {
    location.hash = "stats";
  }
  // Top-nav active state. "user" detail view is reached from Users, so it
  // keeps Users highlighted.
  const onStats = view === "stats";
  $("#nav-users").classList.toggle("active", !onStats);
  $("#nav-stats").classList.toggle("active", onStats);
  // The search box only applies to the user list; hide the whole toolbar
  // on the stats page so it doesn't look like it filters the table.
  const tb = $("#toolbar");
  if (tb) tb.style.display = onStats ? "none" : "";

  renderCrumbs();
  if (view === "users") {
    if (state.users.length === 0) loadUsersBatch();
    else renderUsersView();
  } else if (view === "stats") {
    loadStats();
  } else {
    loadUserGens(true);
  }
  window.scrollTo(0, 0);
}

let io = null;
function setupInfiniteScroll(anchor, cb) {
  if (io) io.disconnect();
  if (!anchor) return;
  io = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting && !state.loading) cb();
    }
  }, { rootMargin: "400px" });
  io.observe(anchor);
}

function renderLoader() {
  if (state.view === "users" && state.users.length > 0) return;
  if (state.view === "user" && state.gens.length > 0) return;
  $("#main").innerHTML = '<div class="loader"><div class="spinner"></div></div>';
}
function renderError(msg, isHtml) {
  const body = isHtml ? msg : esc(msg);
  $("#main").innerHTML = '<div class="error-state"><div class="h">Something went wrong</div>' + body + '</div>';
}

// ── search (filter users by email/name) ─────────────────────────
let searchTimer = null;
$("#search").addEventListener("input", (e) => {
  if (state.view !== "users") return;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.filter = e.target.value.trim();
    state.users = [];
    state.usersOffset = 0;
    state.usersDone = false;
    loadUsersBatch();
  }, 250);
});

// ── hash routing on load + back/forward ─────────────────────────
function fromHash() {
  const m = location.hash.match(/^#user\/(.+)$/);
  if (m) navigate("user", decodeURIComponent(m[1]));
  else if (location.hash === "#stats") navigate("stats");
  else navigate("users");
}
window.addEventListener("hashchange", fromHash);

// Top-nav links.
$("#nav-users").onclick = () => navigate("users");
$("#nav-stats").onclick = () => navigate("stats");

// ── boot ────────────────────────────────────────────────────────
(async function boot() {
  // Probe admin access first. If this 401s or 403s, api() shows the
  // denied splash and #app stays hidden forever. Only on success do we
  // flip body.ready=true to reveal the UI.
  try {
    const probe = await api("/api/studio/admin/users?limit=" + PAGE_SIZE + "&offset=0");
    // Seed the users list from the probe so we don't waste the request.
    state.users = probe.users || [];
    state.usersOffset = state.users.length;
    state.usersDone = !probe.has_more;
    if (typeof probe.total === "number") {
      // Pre-fill the stat pill before reveal so nothing flashes "Loading…".
      const stat = document.getElementById("stat-total");
      if (stat) stat.innerHTML = "<b>" + probe.total.toLocaleString() + "</b> user" + (probe.total === 1 ? "" : "s");
    }
  } catch (e) {
    // 401/403 already painted the denied splash via api(); for those we just
    // stop. For anything else (timeout, 500, network) the splash would
    // otherwise spin forever with no recourse — reveal the shell and show a
    // retry so the admin isn't stranded.
    if (e.message === "not_logged_in" || e.message === "forbidden") return;
    document.body.classList.add("ready");
    $("#me").textContent = "admin";
    renderError(
      "Couldn't load the admin dashboard: " + esc(e.message) +
      '. <button class="btn" onclick="location.reload()">Retry</button>',
      true
    );
    return;
  }

  // Reveal the UI.
  document.body.classList.add("ready");
  $("#me").textContent = "admin";

  // Route from hash (#user/<id> → detail view, otherwise → users list).
  fromHash();
})();
</script>
</body>
</html>
